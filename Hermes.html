    --shadow-md: 0 1px 2px rgba(0,0,0,0.4), 0 14px 34px -12px rgba(0,0,0,0.66);
    --shadow-lg: 0 2px 4px rgba(0,0,0,0.5), 0 26px 60px -18px rgba(0,0,0,0.74);
  }
  body[data-atmos="ink"] .send-btn { color: #0c1016; }
  body[data-atmos="ink"] .send-btn.armed { background: var(--accent); }
  body[data-atmos="ink"] .msg.user .msg-bubble { background: #1e2a36; color: var(--ink); }
  body[data-atmos="ink"] .brand-mark { background: linear-gradient(180deg, #1a2330, #0b0f15); color: var(--accent); }
  body[data-atmos="ink"] .table-row.head,
  body[data-atmos="ink"] .ut-row.head,
  body[data-atmos="ink"] .perm-grid > .head,
  body[data-atmos="ink"] .au-row.head,
  body[data-atmos="ink"] .ws-meta-row,
  body[data-atmos="ink"] .agent-mini { background: rgba(255,255,255,0.025); }
  body[data-atmos="ink"] .docx-paper { background: #f0ebde; color: #1d1a14; }
  body[data-atmos="ink"] .stage,
  body[data-atmos="ink"] .admin-hero {
    background:
      radial-gradient(120% 60% at 82% -8%, rgba(78,203,192,0.08), transparent 58%),
      radial-gradient(90% 55% at 12% 110%, rgba(64,110,180,0.16), transparent 62%),
      var(--bg-canvas);
  }
  body[data-atmos="ink"] .mem-role.admin { background: rgba(78,203,192,0.16); color: #7fe6dc; }
  body[data-atmos="ink"] .role-pill.team_admin { background: rgba(78,203,192,0.16); color: #7fe6dc; }
  body[data-atmos="ink"] .source-pill.local { background: rgba(255,255,255,0.06); }
  body[data-atmos="ink"] .source-pill.ldap { background: rgba(64,110,180,0.2); color: #93b4e6; }
  body[data-atmos="ink"] .source-pill.wecom { background: rgba(78,203,192,0.16); color: #7fe6dc; }
  body[data-atmos="ink"] .ws-tree { background: rgba(255,255,255,0.012); }

  /* ───── Density ───── */
  body[data-density="loose"] { font-size: 15px; line-height: 1.65; }
  body[data-density="loose"] .composer-input { font-size: 16px; line-height: 1.7; min-height: 100px; padding: 22px 24px 8px; }
  body[data-density="loose"] .hello { font-size: 52px; margin-top: 76px; }
  body[data-density="loose"] .hello-sub { font-size: 17px; margin-bottom: 32px; }
  body[data-density="loose"] .msg-bubble { font-size: 15.5px; line-height: 1.8; }
  body[data-density="loose"] .side-row { padding: 10px 12px; }
  body[data-density="loose"] .convo { padding: 9px 12px; font-size: 13.5px; }
  body[data-density="loose"] .thread-inner { gap: 32px; }
  body[data-density="loose"] .landing { padding-top: 60px; }
  body[data-density="loose"] .thread { padding-top: 32px; }
  body[data-density="loose"] .topbar { height: 54px; }
  body[data-density="loose"] .agents-grid { gap: 14px; }
  body[data-density="loose"] .agent-card { padding: 18px; min-height: 84px; }

  body[data-density="tight"] { font-size: 13px; line-height: 1.42; }
  body[data-density="tight"] .composer-input { font-size: 13.5px; min-height: 64px; padding: 12px 16px 4px; }
  body[data-density="tight"] .hello { font-size: 34px; margin-top: 36px; }
  body[data-density="tight"] .hello-sub { font-size: 13px; margin-bottom: 16px; }
  body[data-density="tight"] .msg-bubble { font-size: 13px; line-height: 1.55; }
  body[data-density="tight"] .side-row { padding: 5px 10px; font-size: 12.5px; }
  body[data-density="tight"] .convo { padding: 5px 10px; font-size: 12px; margin-bottom: 0; }
  body[data-density="tight"] .thread-inner { gap: 14px; }
  body[data-density="tight"] .landing { padding-top: 16px; padding-bottom: 80px; }
  body[data-density="tight"] .thread { padding-top: 16px; }
  body[data-density="tight"] .topbar { height: 40px; }
  body[data-density="tight"] .agents-grid { gap: 6px; }
  body[data-density="tight"] .agent-card { padding: 10px 12px; min-height: 60px; gap: 9px; }
  body[data-density="tight"] .agent-desc { -webkit-line-clamp: 1; }
  body[data-density="tight"] .agent-bar { padding: 3px; margin-bottom: 12px; }
  body[data-density="tight"] .agent-chip { padding: 4px 10px; font-size: 12px; }
  body[data-density="tight"] .brand { padding: 10px 12px 8px; }
  body[data-density="tight"] .brand-mark { width: 30px; height: 30px; }
  body[data-density="tight"] .brand-name { font-size: 19px; }

  /* ───── New tweaks panel layout ───── */
  .twk { width: 304px; padding: 12px 14px 14px; }
  .twk-section { padding: 10px 0 8px; border-top: 1px solid var(--rule-soft); }
  .twk-section:first-of-type { border-top: none; padding-top: 4px; }
  .twk-section-label {
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-mute); font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .twk-section-label .twk-hint { font-family: var(--font-serif); font-size: 11px; letter-spacing: 0; text-transform: none; font-style: italic; color: var(--ink-mute); font-weight: 400; }
  .twk-presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .twk-preset {
    border: 1px solid var(--rule);
    border-radius: var(--r-sm);
    padding: 8px 6px 7px;
    background: var(--bg-canvas);
    cursor: pointer;
    transition: border-color 120ms, transform 120ms, background 120ms;
    text-align: center;
    color: var(--ink-soft);
    font-size: 11px;
    font-weight: 500;
  }
  .twk-preset:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
  .twk-preset.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,133,42,0.1); color: var(--ink); background: var(--bg-panel); }
  .twk-preset .swatch {
    width: 100%; height: 28px; border-radius: 4px;
    margin-bottom: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 14px;
    overflow: hidden;
    position: relative;
  }
  .twk-preset .swatch.letter { background: linear-gradient(160deg, #f6f4ee 0%, #efece3 100%); color: #b8852a; border: 1px solid #e5e0d2; }
  .twk-preset .swatch.cinnabar { background: linear-gradient(160deg, #fffdf8 0%, #f0ebdf 100%); color: #cf432b; border: 1px solid #e8ddcd; }
  .twk-preset .swatch.celadon { background: linear-gradient(160deg, #fbfdfb 0%, #e5ece7 100%); color: #2a7864; border: 1px solid #dce5df; border-radius: 9px; }
  .twk-preset .swatch.night { background: linear-gradient(160deg, #1c1912 0%, #0f0d09 100%); color: #e6b25a; border: 1px solid #2c2820; }
  .twk-preset .swatch.ink { background: linear-gradient(160deg, #161c26 0%, #0c1016 100%); color: #4ecbc0; border: 1px solid #242e3a; }
  .twk-preset .swatch.density-loose,
  .twk-preset .swatch.density-normal,
  .twk-preset .swatch.density-tight {
    background: var(--bg-canvas); border: 1px solid var(--rule);
    display: flex; flex-direction: column; gap: 2px; padding: 4px 6px; justify-content: center; align-items: stretch;
  }
  .twk-preset .swatch.density-loose::before,
  .twk-preset .swatch.density-loose::after,
  .twk-preset .swatch.density-normal::before,
  .twk-preset .swatch.density-normal::after,
  .twk-preset .swatch.density-tight::before,
  .twk-preset .swatch.density-tight::after,
  .twk-preset .swatch.density-loose i,
  .twk-preset .swatch.density-normal i,
  .twk-preset .swatch.density-tight i {
    content: ''; display: block; height: 2px; background: var(--ink-soft); border-radius: 1px;
  }
  .twk-preset .swatch.density-loose i { margin: 3px 0; }
  .twk-preset .swatch.density-normal i { margin: 1.5px 0; }
  .twk-preset .swatch.density-tight i { margin: 0.5px 0; }
  .twk-preset .swatch.voice {
    background: var(--bg-canvas); border: 1px solid var(--rule);
    font-family: var(--font-serif); font-style: italic; font-size: 16px;
    color: var(--accent-deep);
  }
  .twk-preset .swatch.voice.engineering { font-family: var(--font-mono); font-style: normal; font-size: 11px; letter-spacing: 0.1em; }
  .twk-preset .swatch.voice.warm { font-style: normal; font-weight: 600; }

  /* ───── Replay & view-mode action buttons ───── */
  .thread-actions { display: flex; gap: 4px; align-items: center; }
  .thread-action {
    display: inline-flex; align-items: center; gap: 5px;
    height: 28px; padding: 0 11px;
    border-radius: 999px;
    color: var(--ink-mute);
    font-size: 12px;
    border: 1px solid transparent;
    transition: color 120ms, border-color 120ms, background 120ms;
  }
  .thread-action:hover { color: var(--ink); border-color: var(--rule); }
  .thread-action.on { color: var(--accent-deep); background: var(--accent-tint); border-color: var(--accent-soft); font-weight: 600; }
  .thread-action svg { width: 12px; height: 12px; }

  /* ───── Profile picker (replaces model picker) ───── */
  .model-pick { gap: 7px; padding: 0 11px 0 8px; }
  .profile-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px var(--bg-panel), 0 0 0 3px rgba(29,26,20,0.06);
  }
  .profile-model {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mute);
    background: rgba(29,26,20,0.05);
    padding: 1px 5px;
    border-radius: 4px;
    margin-left: 1px;
  }
  body[data-atmos="night"] .profile-model { background: rgba(255,255,255,0.05); }
  .menu-item.profile-item { gap: 11px; align-items: flex-start; padding: 9px 10px; }
  .profile-avatar {
    width: 26px; height: 26px;
    border-radius: 6px;
    color: white;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .profile-avatar svg { width: 13px; height: 13px; }
  .profile-meta { flex: 1; min-width: 0; }
  .profile-name {
    font-size: 12.5px; font-weight: 600; color: var(--ink);
    display: flex; align-items: center; gap: 6px; line-height: 1.3;
  }
  .profile-handle {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mute);
    font-weight: 400;
  }
  .profile-desc {
    font-size: 11px; color: var(--ink-mute);
    margin-top: 2px;
    line-height: 1.4;
  }
  .menu-item.profile-item .profile-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--accent-tint);
    color: var(--accent-deep);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 2px;
  }
  .menu-item.profile-item.active { background: var(--accent-tint); }
  .menu-item.profile-item.active .profile-name { color: var(--accent-deep); }
  .menu-foot-acp {
    padding: 8px 12px;
    font-size: 10.5px;
    font-family: var(--font-mono);
    color: var(--ink-mute);
    letter-spacing: 0.04em;
    background: rgba(29,26,20,0.03);
    display: flex; align-items: center; gap: 6px;
    border-top: 1px solid var(--rule-soft);
    margin: 4px -6px -6px;
  }
  body[data-atmos="night"] .menu-foot-acp { background: rgba(255,255,255,0.025); }
  .menu-foot-acp svg { width: 11px; height: 11px; color: var(--accent-deep); }

  /* ───── Modals (shared) ───── */
  .modal-scrim {
    position: fixed; inset: 0;
    background: rgba(29,26,20,0.42);
    backdrop-filter: blur(6px);
    z-index: 300;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 10vh 16px 32px;
    overflow-y: auto;
    opacity: 1;
    animation: fadeIn 150ms ease both;
  }
  body[data-atmos="night"] .modal-scrim { background: rgba(0,0,0,0.6); }
  .modal {
    width: 100%;
    background: var(--bg-panel);
    border: 1px solid var(--rule);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    opacity: 1;
    animation: modalIn 220ms cubic-bezier(.4,0,.2,1) both;
    display: flex; flex-direction: column;
    max-height: calc(100vh - 16vh);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 14px;
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .modal-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.15;
  }
  .modal-sub {
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--ink-soft);
    font-size: 13.5px;
    margin-top: 2px;
  }
  .modal-close {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: grid; place-items: center;
    color: var(--ink-mute);
    transition: background 120ms, color 120ms;
    flex-shrink: 0;
  }
  .modal-close:hover { background: rgba(29,26,20,0.05); color: var(--ink); }
  .modal-close svg { width: 14px; height: 14px; }
  .modal-body {
    padding: 18px 22px;
    overflow-y: auto;
    flex: 1;
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .modal-foot {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 22px;
    border-top: 1px solid var(--rule-soft);
    background: rgba(29,26,20,0.02);
  }
  body[data-atmos="night"] .modal-foot { background: rgba(255,255,255,0.02); }

  /* ───── New project ───── */
  .np-identity {
    display: flex; gap: 14px; align-items: stretch;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule-soft);
  }
  .np-preview {
    width: 56px; height: 56px;
    border-radius: 14px;
    flex-shrink: 0;
    transition: background 200ms;
  }
  .np-preview svg { width: 26px; height: 26px; }
  .np-name-row { display: flex; align-items: baseline; gap: 6px; }
  .np-input {
    width: 100%;
    background: var(--bg-canvas);
    border: 1px solid var(--rule);
    border-radius: var(--r-sm);
    padding: 9px 12px;
    color: var(--ink);
    font-size: 13.5px;
    font-family: inherit;
    outline: none;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .np-input:focus { border-color: var(--accent-soft); box-shadow: 0 0 0 3px rgba(184,133,42,0.08); }
  body[data-atmos="night"] .np-input { background: #15130d; }
  body[data-atmos="ink"] .np-input { background: #11151c; }
  .np-name {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 600;
    padding: 6px 12px;
  }
  .np-counter { font-size: 11px; color: var(--ink-mute); font-family: var(--font-mono); flex-shrink: 0; }
  .np-handle-row { display: flex; align-items: center; gap: 4px; margin-top: 6px; }
  .np-handle-at { color: var(--ink-mute); font-family: var(--font-mono); font-size: 13px; }
  .np-handle { font-family: var(--font-mono); font-size: 12.5px; padding: 6px 10px; max-width: 220px; }
  .np-hint { font-size: 11px; color: var(--ink-mute); margin-left: 4px; font-style: italic; font-family: var(--font-serif); }

  .np-field { display: flex; flex-direction: column; gap: 7px; }
  .np-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .np-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-mute);
    font-weight: 600;
    display: flex; align-items: baseline; gap: 8px;
  }
  .np-label .np-hint { text-transform: none; letter-spacing: 0; font-weight: 400; }
  .np-textarea { resize: vertical; min-height: 64px; line-height: 1.55; }

  .np-swatches { display: flex; gap: 6px; }
  .np-swatch {
    width: 26px; height: 26px;
    border-radius: 50%;
    transition: transform 120ms, box-shadow 120ms;
    cursor: pointer;
    border: 2px solid transparent;
    box-shadow: inset 0 0 0 1px rgba(29,26,20,0.08);
  }
  .np-swatch:hover { transform: scale(1.08); }
  .np-swatch.active { box-shadow: 0 0 0 2px var(--bg-panel), 0 0 0 4px var(--ink); transform: scale(1.06); }

  .np-icon-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .np-icon-btn {
    width: 32px; height: 32px;
    border-radius: var(--r-sm);
    background: var(--bg-canvas);
    border: 1px solid var(--rule);
    display: grid; place-items: center;
    color: var(--ink-mute);
    transition: border-color 120ms, color 120ms, background 120ms;
    cursor: pointer;
  }
  .np-icon-btn:hover { color: var(--ink); border-color: var(--ink-faint); }
  .np-icon-btn.active { background: var(--accent-tint); border-color: var(--accent); color: var(--accent-deep); }
  .np-icon-btn svg { width: 14px; height: 14px; }

  .np-seg { display: inline-flex; background: rgba(29,26,20,0.04); border-radius: 999px; padding: 3px; gap: 0; flex-wrap: wrap; }
  body[data-atmos="night"] .np-seg { background: rgba(255,255,255,0.04); }
  .np-seg button {
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11.5px;
    color: var(--ink-mute);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .np-seg button svg { width: 11px; height: 11px; }
  .np-seg button.active { background: var(--bg-panel); color: var(--ink); box-shadow: var(--shadow-sm); }

  .np-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .np-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px;
    border-radius: 999px;
    background: var(--bg-canvas);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    font-size: 12px;
    transition: border-color 120ms, background 120ms, color 120ms;
    cursor: pointer;
  }
  .np-chip:hover { border-color: var(--ink-faint); color: var(--ink); }
  .np-chip.on { background: var(--accent-tint); border-color: var(--accent-soft); color: var(--accent-deep); font-weight: 600; }
  .np-chip.on svg { color: var(--accent-deep); }

  .np-agents { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .np-agent {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    border-radius: var(--r-sm);
    background: var(--bg-canvas);
    border: 1px solid var(--rule);
    cursor: pointer;
    transition: border-color 120ms, background 120ms;
    text-align: left;
  }
  .np-agent:hover { border-color: var(--ink-faint); }
  .np-agent.on { background: var(--accent-tint); border-color: var(--accent-soft); }
  .np-agent-ico {
    width: 22px; height: 22px;
    border-radius: 5px;
    display: grid; place-items: center;
    color: white;
    flex-shrink: 0;
  }
  .np-agent-ico svg { width: 11px; height: 11px; }
  .np-agent-nm { font-size: 12px; font-weight: 500; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-agent-check {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: grid; place-items: center;
    flex-shrink: 0;
  }

  .np-members {
    display: flex; flex-direction: column; gap: 3px;
    max-height: 220px; overflow-y: auto;
    border: 1px solid var(--rule); border-radius: var(--r-sm);
    padding: 4px;
  }
  .np-mem {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 8px;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: background 120ms;
    text-align: left;
  }
  .np-mem:hover { background: rgba(29,26,20,0.04); }
  .np-mem.on { background: var(--accent-tint); }
  .np-mem-av {
    width: 24px; height: 24px; border-radius: 50%;
    color: white; font-weight: 600; font-size: 10px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .np-mem-nm { font-size: 12.5px; color: var(--ink); font-weight: 500; flex: 1; }
  .np-mem-role { font-size: 10.5px; color: var(--ink-mute); }
  .np-mem-check { color: var(--accent-deep); display: grid; place-items: center; }

  .np-foot-hint { font-size: 11.5px; color: var(--ink-mute); font-style: italic; font-family: var(--font-serif); }
  .modal-foot .btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ───── Invite Members ───── */
  .inv-roles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .inv-role {
    background: var(--bg-canvas);
    border: 1px solid var(--rule);
    border-radius: var(--r-sm);
    padding: 9px 11px;
    text-align: left;
    cursor: pointer;
    transition: border-color 120ms, background 120ms;
  }
  .inv-role:hover { border-color: var(--ink-faint); }
  .inv-role.on { background: var(--accent-tint); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,133,42,0.08); }
  .inv-role-nm { font-size: 13px; font-weight: 600; color: var(--ink); }
  .inv-role-ds { font-size: 11px; color: var(--ink-mute); margin-top: 2px; line-height: 1.4; }

  .inv-tabs {
    display: flex; gap: 2px;
    padding: 3px;
    background: rgba(29,26,20,0.04);
    border-radius: 999px;
    width: fit-content;
  }
  body[data-atmos="night"] .inv-tabs { background: rgba(255,255,255,0.04); }
  .inv-tabs button {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 14px;
    border-radius: 999px;
    color: var(--ink-mute);
    font-size: 12.5px;
    font-weight: 500;
    transition: color 120ms, background 120ms;
  }
  .inv-tabs button svg { width: 12px; height: 12px; }
  .inv-tabs button.on { background: var(--bg-panel); color: var(--ink); box-shadow: var(--shadow-sm); font-weight: 600; }
  .inv-pane {
    background: var(--bg-canvas);
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 14px;
  }
  body[data-atmos="night"] .inv-pane { background: rgba(255,255,255,0.015); }

  .inv-link-box {
    display: flex; align-items: center; gap: 8px;
    padding: 6px;
    background: var(--bg-panel);
    border: 1px solid var(--rule);
    border-radius: var(--r-sm);
  }
  .inv-link-box > svg:first-child { width: 14px; height: 14px; color: var(--ink-mute); margin: 0 4px 0 8px; flex-shrink: 0; }
  .inv-link-input {
    border: none !important;
    background: transparent !important;
    flex: 1; min-width: 0;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 0;
    box-shadow: none !important;
  }
  .inv-meta { display: flex; flex-wrap: wrap; gap: 12px; padding-top: 4px; font-size: 11.5px; color: var(--ink-mute); }
  .inv-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .inv-meta svg { width: 11px; height: 11px; }

  .inv-email-input { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6; min-height: 96px; }
  .inv-email-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .inv-parsed {
    font-size: 11.5px; color: var(--ok);
    display: inline-flex; align-items: center; gap: 5px;
    font-weight: 500;
  }
  .inv-parsed svg { width: 12px; height: 12px; }
  .inv-parsed.empty { color: var(--ink-mute); font-weight: 400; }

  .inv-sso-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 4px;
  }
  .inv-sso-row + .inv-sso-row { border-top: 1px solid var(--rule-soft); }
  .inv-sso-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: grid; place-items: center;
    font-weight: 700;
    flex-shrink: 0;
    font-family: var(--font-mono);
  }
  .inv-sso-nm {
    font-size: 13px; font-weight: 600; color: var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .inv-sso-on, .inv-sso-off {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 1px 7px;
    border-radius: 999px;
  }
  .inv-sso-on { background: rgba(74,122,58,0.14); color: var(--ok); }
  .inv-sso-off { background: rgba(29,26,20,0.06); color: var(--ink-mute); }
  body[data-atmos="night"] .inv-sso-off { background: rgba(255,255,255,0.06); }
  .inv-sso-ds { font-size: 11.5px; color: var(--ink-mute); margin-top: 2px; line-height: 1.4; }

  .inv-pending {
    border: 1px solid var(--rule);
    border-radius: var(--r-sm);
    background: var(--bg-canvas);
    overflow: hidden;
  }
  body[data-atmos="night"] .inv-pending { background: rgba(255,255,255,0.015); }
  .inv-pending-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
  }
  .inv-pending-row + .inv-pending-row { border-top: 1px solid var(--rule-soft); }
  .inv-pending-em { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .inv-pending-meta { font-size: 11px; color: var(--ink-mute); display: flex; align-items: center; gap: 5px; flex-wrap: nowrap; white-space: nowrap; }
  .inv-pending-meta .role-pill { font-size: 10px; padding: 1px 7px; }
  .inv-pending-action {
    width: 24px; height: 24px;
    border-radius: 5px;
    display: grid; place-items: center;
    color: var(--ink-mute);
    transition: background 120ms, color 120ms;
  }
  .inv-pending-action:hover { background: rgba(29,26,20,0.06); color: var(--ink); }
  .inv-pending-action.danger:hover { background: rgba(177,74,58,0.14); color: var(--danger); }
  .inv-pending-action svg { width: 12px; height: 12px; }
  .inv-pending-empty { padding: 18px; text-align: center; color: var(--ink-mute); font-size: 12px; }

  @media (max-width: 700px) {
    .np-row { grid-template-columns: 1fr; }
    .np-agents { grid-template-columns: 1fr; }
    .inv-roles { grid-template-columns: 1fr; }
    .inv-pending-row { grid-template-columns: 1fr auto; }
    .inv-pending-meta { grid-column: 1 / -1; padding-top: 4px; }
  }

  /* ───── Toast ───── */
  .hm-toast {
    position: fixed;
    left: 50%; bottom: 30px;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--bg-canvas);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-lg);
    z-index: 500;
    animation: toastIn 220ms cubic-bezier(.4,0,.2,1);
  }
  .hm-toast svg { width: 13px; height: 13px; color: var(--accent); }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 8px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ───── Conversation seal ───── */
  .convo-seal {
    width: 36px; height: 36px;
    flex-shrink: 0;
    display: inline-block;
    vertical-align: middle;
  }
  .thread-title-row { display: flex; align-items: center; gap: 12px; }
  .thread-title-row .thread-title { margin: 0; }
  .convo-seal-lg { width: 52px; height: 52px; }

  /* ───── Roundtable (multi-agent parallel replies) ───── */
  .roundtable {
    margin-top: 6px;
    margin-left: 40px;
    padding: 12px 0 4px;
    position: relative;
  }
  .roundtable::before {
    content: ''; position: absolute;
    left: -28px; top: 0; bottom: 12px;
    width: 1px; background: var(--accent-soft);
  }
  .roundtable-label {
    font-family: var(--font-serif);
    font-size: 12px;
    font-style: italic;
    color: var(--ink-mute);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .roundtable-label::before {
    content: ''; display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
  }
  .rt-card {
    background: var(--bg-panel);
    border: 1px solid var(--rule);
    border-radius: var(--r-md);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: border-color 120ms;
  }
  .rt-card:hover { border-color: var(--accent-soft); }
  .rt-card-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .rt-card-head .rt-avatar {
    width: 22px; height: 22px; border-radius: 6px;
    display: grid; place-items: center;
    color: white;
  }
  .rt-card-head .rt-avatar svg { width: 11px; height: 11px; }
  .rt-card-head .rt-name { font-weight: 600; color: var(--ink); font-size: 12px; }
  .rt-card-head .rt-stance {
    margin-left: auto;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 11px;
    color: var(--ink-mute);
  }
  .rt-card-body {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-soft);
    white-space: pre-wrap;
  }
  .rt-card-body .typing { padding: 2px 0; }
  .rt-vote {
    display: flex; gap: 4px;
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid var(--rule-soft);
  }
  .rt-vote button {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    color: var(--ink-mute);
    background: rgba(29,26,20,0.04);
    transition: background 120ms, color 120ms;
  }
  .rt-vote button:hover { background: rgba(29,26,20,0.08); color: var(--ink); }
  .rt-vote button.chosen { background: var(--accent-tint); color: var(--accent-deep); font-weight: 600; }
  .rt-merge {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: var(--r-sm);
    background: linear-gradient(180deg, var(--accent-tint), transparent 80%);
    border: 1px dashed var(--accent-soft);
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .rt-merge-head {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--accent-deep);
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .rt-merge-head svg { width: 12px; height: 12px; }

  /* ───── CRUD row actions (knowledge / pinned / tasks / files) ───── */
  .row-item.has-actions, .file-row.has-actions { position: relative; }
  .row-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: auto; }
  .file-row.has-actions .row-actions, .row-item.has-actions .row-actions { opacity: 0; transition: opacity 120ms; }
  .file-row.has-actions:hover .row-actions, .row-item.has-actions:hover .row-actions,
  .task-row:hover .row-actions { opacity: 1; }
  .row-act {
    width: 26px; height: 26px; border-radius: 7px;
    display: grid; place-items: center;
    color: var(--ink-mute);
    transition: background 120ms, color 120ms;
  }
  .row-act:hover { background: rgba(29,26,20,0.06); color: var(--ink); }
  .row-act.danger:hover { background: rgba(177,74,58,0.1); color: var(--danger); }
  .row-act.accent { color: var(--accent-deep); }
  .row-act.accent:hover { background: var(--accent-tint); }

  /* remove button floating over agent / project cards */
  .agent-card-wrap, .proj-card-wrap { position: relative; }
  .card-remove {
    position: absolute; top: 10px; right: 10px;
    width: 24px; height: 24px; border-radius: 7px;
    display: grid; place-items: center;
    background: var(--bg-panel); border: 1px solid var(--rule);
    color: var(--ink-mute); opacity: 0;
    transition: opacity 120ms, color 120ms, border-color 120ms;
  }
  .agent-card-wrap:hover .card-remove { opacity: 1; }
  .card-remove:hover { color: var(--danger); border-color: var(--danger); }
  .card-menu-btn {
    width: 26px; height: 26px; border-radius: 7px;
    display: grid; place-items: center;
    background: var(--bg-panel); border: 1px solid var(--rule);
    color: var(--ink-mute); opacity: 0;
    transition: opacity 120ms, color 120ms;
  }
  .proj-card-wrap:hover .card-menu-btn { opacity: 1; }
  .card-menu-btn:hover { color: var(--ink); }

  .menu-item.danger { color: var(--danger); }
  .menu-item.danger svg { color: var(--danger); }
  .menu-item.danger:hover { background: rgba(177,74,58,0.08); }
  .btn.btn-danger { background: var(--danger); border-color: var(--danger); color: white; }
  .btn.btn-danger:hover { background: #9a3d2f; border-color: #9a3d2f; }

  /* ───── Confirm modal ───── */
  .cf-body { display: flex; gap: 14px; align-items: flex-start; }
  .cf-icon {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    display: grid; place-items: center;
    background: var(--accent-tint); color: var(--accent-deep);
  }
  .cf-icon.danger { background: rgba(177,74,58,0.12); color: var(--danger); }
  .cf-icon svg { width: 18px; height: 18px; }
  .cf-msg { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.5; }
  .cf-detail { font-size: 12.5px; color: var(--ink-mute); margin-top: 5px; line-height: 1.55; }

  /* ───── Task list (project business) ───── */
  .task-row {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 11px 16px;
    border-top: 1px solid var(--rule-soft);
    transition: background 120ms;
  }
  .task-row:first-child { border-top: none; }
  .task-row:hover { background: rgba(29,26,20,0.02); }
  .task-status {
    width: 20px; height: 20px; border-radius: 6px; margin-top: 1px;
    border: 1.6px solid var(--ink-faint); flex-shrink: 0;
    display: grid; place-items: center;
    color: white; transition: background 120ms, border-color 120ms;
  }
  .task-status:disabled { cursor: default; }
  .task-status.doing { border-color: var(--accent); }
  .task-status.doing .half { width: 9px; height: 9px; border-radius: 2px; background: var(--accent); }
  .task-status.done { background: var(--ok); border-color: var(--ok); }
  .task-title { font-size: 13.5px; font-weight: 500; color: var(--ink); line-height: 1.45; }
  .task-title.done { text-decoration: line-through; color: var(--ink-mute); }
  .task-edit-input {
    width: 100%; font-size: 13.5px; font-weight: 500; color: var(--ink);
    background: var(--bg-canvas); border: 1px solid var(--accent-soft);
    border-radius: 7px; padding: 4px 8px; outline: none;
  }
  body[data-atmos="night"] .task-edit-input, body[data-atmos="ink"] .task-edit-input { background: rgba(255,255,255,0.04); }
  .task-meta { display: flex; align-items: center; gap: 12px; margin-top: 5px; flex-wrap: wrap; }
  .task-status-pill {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    padding: 1px 8px; border-radius: 999px;
    background: rgba(29,26,20,0.05); color: var(--ink-mute);
  }
  .task-status-pill.doing { background: var(--accent-tint); color: var(--accent-deep); }
  .task-status-pill.done { background: rgba(74,122,58,0.12); color: var(--ok); }
  .task-owner, .task-agent { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--ink-mute); }
  .mem-avatar.tiny { width: 16px; height: 16px; font-size: 8.5px; border-radius: 4px; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .task-add {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-top: 1px dashed var(--rule);
  }
  .task-add-input {
    flex: 1; border: none; background: none; outline: none;
    font-size: 13px; color: var(--ink); padding: 4px 0;
  }
  .task-add-input::placeholder { color: var(--ink-faint); }

  /* ───── Team content-permission matrix ───── */
  .perm-note {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    flex-wrap: wrap;
    padding: 12px 18px; font-size: 12px; color: var(--ink-mute); line-height: 1.55;
    border-bottom: 1px solid var(--rule-soft);
  }
  .perm-note b { color: var(--accent-deep); }
  .perm-yours { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .perm-table.team-perm { border: none; border-radius: 0; }
  .perm-grid.team-grid { grid-template-columns: minmax(200px, 2fr) repeat(4, minmax(72px, 1fr)); }
  .perm-grid.team-grid .group-row svg { vertical-align: -2px; margin-right: 4px; }
  .perm-hint { font-size: 11px; color: var(--ink-mute); margin-top: 2px; font-weight: 400; }
  .perm-cell {
    width: 22px; height: 22px; border-radius: 6px;
    border: 1.5px solid var(--ink-faint);
    display: grid; place-items: center;
    color: white; opacity: 0.5;
    transition: background 120ms, border-color 120ms, opacity 120ms, transform 80ms;
  }
  .perm-cell:not(.locked):hover { opacity: 1; border-color: var(--accent); transform: scale(1.08); }
  .perm-cell.on { background: var(--accent); border-color: var(--accent); opacity: 1; }
  .perm-cell.on.locked { background: var(--accent-deep); border-color: var(--accent-deep); }
  .perm-cell.locked { cursor: default; }
  .perm-table.team-perm.readonly .perm-cell:not(.locked) { cursor: default; }
  .perm-table.team-perm.readonly .perm-cell:not(.locked):hover { transform: none; opacity: 0.5; border-color: var(--ink-faint); }
  .perm-table.team-perm.readonly .perm-cell.on:hover { opacity: 1; border-color: var(--accent); }

  /* ═════════ Login screen ═════════ */
  .login-screen {
    height: 100vh; width: 100%;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    background: var(--bg-canvas);
    overflow: hidden;
  }
  .login-brand {
    position: relative;
    background: linear-gradient(155deg, #211b12 0%, #15110b 55%, #0f0c07 100%);
    color: #efe6cd;
    padding: 48px 52px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .login-brand-top { display: flex; align-items: center; gap: 14px; position: relative; z-index: 2; }
  .login-mark {
    width: 52px; height: 52px; border-radius: 13px;
    background: linear-gradient(180deg, #2a241a, #15110b);
    display: grid; place-items: center;
    color: var(--accent);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 2px 6px rgba(0,0,0,0.3);
  }
  .login-wordmark { font-family: var(--font-serif); font-size: 26px; font-weight: 600; line-height: 1; color: #f3ecda; }
  .login-wordtag { font-size: 9.5px; letter-spacing: 0.24em; color: #9a8e6e; margin-top: 4px; }
  .login-brand-mid { margin-top: auto; margin-bottom: auto; position: relative; z-index: 2; }
  .login-quote { font-family: var(--font-serif); font-size: 46px; font-weight: 500; line-height: 1.18; letter-spacing: -0.01em; }
  .login-quote em { font-style: italic; color: var(--accent); }
  .login-quote-sub { font-family: var(--font-serif); font-style: italic; font-size: 16px; color: #8f835f; margin-top: 16px; }
  .login-brand-foot { position: relative; z-index: 2; font-size: 12px; color: #9a8e6e; }
  .login-foot-line { display: flex; align-items: center; gap: 8px; font-weight: 500; color: #c2b896; }
  .login-foot-line .lf-dot { width: 7px; height: 7px; border-radius: 50%; background: #6fae5a; box-shadow: 0 0 8px rgba(111,174,90,0.6); }
  .login-foot-meta { margin-top: 6px; font-family: var(--font-mono); font-size: 11px; color: #7e7457; }
  .login-seal-bg {
    position: absolute; right: -40px; bottom: -60px;
    font-family: var(--font-serif); font-size: 380px; font-weight: 600;
    color: rgba(184,133,42,0.05);
    line-height: 1; pointer-events: none; z-index: 1; user-select: none;
  }

  .login-panel { display: grid; place-items: center; padding: 40px; overflow-y: auto; }
  .login-card { width: 100%; max-width: 380px; }
  .login-card-head { margin-bottom: 22px; }
  .login-card-title { font-family: var(--font-serif); font-size: 27px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
  .login-card-sub { font-size: 13px; color: var(--ink-mute); margin-top: 4px; }

  .login-tabs {
    display: flex; gap: 2px; padding: 3px;
    background: rgba(29,26,20,0.05);
    border-radius: 999px; margin-bottom: 22px;
  }
  body.dark .login-tabs, body[data-atmos="night"] .login-tabs, body[data-atmos="ink"] .login-tabs { background: rgba(255,255,255,0.05); }
  .login-tab {
    flex: 1; padding: 8px 6px; border-radius: 999px;
    font-size: 12.5px; font-weight: 500; color: var(--ink-mute);
    transition: background 150ms, color 150ms; white-space: nowrap;
  }
  .login-tab:hover { color: var(--ink); }
  .login-tab.active { background: var(--bg-panel); color: var(--ink); box-shadow: var(--shadow-sm); }

  .login-pane { display: flex; flex-direction: column; gap: 16px; animation: loginFade 220ms ease; }
  @keyframes loginFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .login-field { display: flex; flex-direction: column; gap: 7px; }
  .login-label { font-size: 12px; font-weight: 500; color: var(--ink-soft); display: flex; justify-content: space-between; align-items: center; }
  .login-link { color: var(--accent-deep); font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
  .login-link:hover { text-decoration: underline; }
  .login-input-wrap {
    display: flex; align-items: center; gap: 9px;
    height: 44px; padding: 0 13px;
    border: 1px solid var(--rule);
    border-radius: var(--r-sm);
    background: var(--bg-panel);
    transition: border-color 150ms, box-shadow 150ms;
  }
  .login-input-wrap:focus-within { border-color: var(--accent-soft); box-shadow: 0 0 0 3px rgba(184,133,42,0.1); }
  .login-input-wrap .li-ico { color: var(--ink-faint); flex-shrink: 0; }
  .login-input { flex: 1; border: none; outline: none; background: transparent; color: var(--ink); font-size: 14px; min-width: 0; }
  .login-input::placeholder { color: var(--ink-faint); }
  .li-eye { color: var(--ink-mute); width: 24px; height: 24px; display: grid; place-items: center; border-radius: 5px; flex-shrink: 0; }
  .li-eye:hover { background: rgba(29,26,20,0.05); color: var(--ink); }

  .login-remember { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--ink-soft); cursor: default; }
  .login-check {
    width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
    border: 1.5px solid var(--ink-faint);
    display: grid; place-items: center; cursor: pointer;
    color: white; transition: background 120ms, border-color 120ms;
  }
  .login-check.on { background: var(--accent); border-color: var(--accent); }

  .login-error { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--danger); font-weight: 500; }

  .login-submit {
    height: 46px; border-radius: var(--r-sm);
    background: var(--ink); color: var(--bg-canvas);
    font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 140ms, transform 120ms, opacity 140ms;
    margin-top: 2px;
  }
  .login-submit:hover { background: var(--accent); transform: translateY(-1px); }
  .login-submit.busy { background: var(--ink-faint); cursor: default; }
  .login-submit.busy:hover { transform: none; }
  .login-submit .typing span { background: var(--bg-canvas); }

  .login-note {
    display: flex; align-items: flex-start; gap: 7px;
    font-size: 11.5px; color: var(--ink-mute); line-height: 1.5;
    background: var(--accent-tint); border-radius: var(--r-sm);
    padding: 9px 11px;
  }
  .login-note svg { color: var(--accent-deep); flex-shrink: 0; margin-top: 2px; }

  /* LDAP server banner */
  .login-srv {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 13px; border-radius: var(--r-sm);
    border: 1px solid var(--rule); background: var(--bg-panel);
  }
  .login-srv-logo { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; color: white; flex-shrink: 0; }
  .login-srv-nm { font-size: 13px; font-weight: 600; color: var(--ink); }
  .login-srv-meta { font-size: 11px; color: var(--ink-mute); font-family: var(--font-mono); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .login-srv-on { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 600; color: var(--ok); flex-shrink: 0; }
  .login-srv-on .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* WeCom QR */
  .login-pane-qr { align-items: center; }
  .login-qr { padding: 6px; }
  .login-qr-frame {
    position: relative; width: 188px; height: 188px;
    background: white; border-radius: var(--r-md);
    border: 1px solid var(--rule); padding: 14px;
    box-shadow: var(--shadow-sm); overflow: hidden;
  }
  .qr-grid { width: 100%; height: 100%; display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(7, 1fr); gap: 3px; }
  .qr-grid i { border-radius: 2px; background: transparent; }
  .qr-grid i.fill { background: #1d1a14; }
  .qr-corner { position: absolute; width: 34px; height: 34px; border: 4px solid #1d1a14; border-radius: 7px; }
  .qr-corner.tl { top: 14px; left: 14px; } .qr-corner.tr { top: 14px; right: 14px; }
  .qr-corner.bl { bottom: 14px; left: 14px; }
  .qr-corner.br { width: 14px; height: 14px; bottom: 24px; right: 24px; border-width: 0; background: var(--accent); border-radius: 3px; }
  .qr-scanline { position: absolute; left: 14px; right: 14px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); top: 14px; animation: qrScan 2.4s ease-in-out infinite; opacity: 0.9; }
  @keyframes qrScan { 0%,100% { transform: translateY(0); } 50% { transform: translateY(156px); } }
  .login-qr.scanned .qr-scanline, .login-qr.confirmed .qr-scanline { display: none; }
  .qr-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.94); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; animation: fadeIn 200ms; }
  .qr-overlay-ico { width: 48px; height: 48px; border-radius: 50%; display: grid; place-items: center; background: var(--accent-tint); color: var(--accent-deep); }
  .qr-overlay-ico.confirmed { background: rgba(74,122,58,0.14); color: var(--ok); }
  .qr-overlay-tx { font-size: 12.5px; color: #4b463c; font-weight: 500; }
  .login-qr-tip { text-align: center; margin-top: 4px; }
  .login-qr-tip-main { font-size: 13.5px; color: var(--ink); }
  .login-qr-tip .login-link { margin-top: 6px; justify-content: center; }

  /* other providers */
  .login-others { margin-top: 24px; }
  .login-or { display: flex; align-items: center; gap: 12px; color: var(--ink-mute); font-size: 11px; margin-bottom: 14px; }
  .login-or::before, .login-or::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .login-other-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .login-other {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 11px; border-radius: var(--r-sm);
    border: 1px solid var(--rule); background: var(--bg-panel);
    font-size: 12.5px; color: var(--ink-soft);
    transition: border-color 120ms, color 120ms;
  }
  .login-other:hover { border-color: var(--ink-faint); color: var(--ink); }
  .login-other-logo { width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; color: white; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .login-other-soon { margin-left: auto; font-size: 9px; color: var(--ink-mute); background: rgba(29,26,20,0.05); padding: 1px 5px; border-radius: 4px; }

  .login-card-foot { margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--rule-soft); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--ink-mute); }
  .login-demo { font-size: 12px; color: var(--ink-soft); font-weight: 500; padding: 4px 0; }
  .login-demo:hover { color: var(--accent-deep); }

  @media (max-width: 860px) {
    .login-screen { grid-template-columns: 1fr; }
    .login-brand { display: none; }
  }

  /* ═════════ User profile page ═════════ */
  .side-logout { margin-left: auto; width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; color: var(--ink-mute); flex-shrink: 0; }
  .side-logout:hover { background: rgba(177,74,58,0.12); color: var(--danger); }
  .side-logout svg { width: 14px; height: 14px; }

  .up-avatar {
    width: 72px; height: 72px; border-radius: 18px;
    display: grid; place-items: center;
    color: white; font-weight: 600; font-size: 28px;
    font-family: var(--font-serif);
    flex-shrink: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 8px 24px -10px rgba(29,26,20,0.22);
  }
  .up-at { color: var(--ink-mute); font-family: var(--font-mono); font-size: 13px; padding-top: 7px; flex-shrink: 0; }
  .up-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .up-sw { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--rule); cursor: pointer; transition: transform 120ms; }
  .up-sw:hover { transform: scale(1.12); }
  .up-sw.active { box-shadow: 0 0 0 2px var(--bg-panel), 0 0 0 4px var(--ink); }
  .up-seg { display: inline-flex; background: rgba(29,26,20,0.05); border-radius: 999px; padding: 2px; flex-wrap: wrap; }
  body.dark .up-seg, body[data-atmos="night"] .up-seg, body[data-atmos="ink"] .up-seg { background: rgba(255,255,255,0.05); }
  .up-seg button { padding: 5px 12px; border-radius: 999px; font-size: 12px; color: var(--ink-mute); font-weight: 500; }
  .up-seg button.active { background: var(--bg-panel); color: var(--ink); box-shadow: var(--shadow-sm); }
  .up-stat { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--rule-soft); font-size: 13px; color: var(--ink-soft); }
  .up-stat:last-of-type { border-bottom: none; }
  .up-stat b { font-family: var(--font-serif); font-size: 18px; color: var(--ink); }
  .up-toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 12px 18px; border-bottom: 1px solid var(--rule-soft); }
  .up-toggle-row:last-child { border-bottom: none; }
  .up-toggle-nm { font-size: 13px; font-weight: 500; color: var(--ink); }
  .up-toggle-ds { font-size: 11.5px; color: var(--ink-mute); margin-top: 2px; }
  .up-savebar {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 20px;
    background: var(--ink); color: var(--bg-canvas);
    padding: 10px 12px 10px 18px; border-radius: 999px;
    box-shadow: var(--shadow-lg); z-index: 90;
    font-size: 13px; font-weight: 500;
  }
  .up-savebar svg { color: var(--accent); }
  .up-savebar .btn { height: 30px; }
  .savebar-enter-active, .savebar-leave-active { transition: opacity 180ms, transform 180ms; }
  .savebar-enter-from, .savebar-leave-to { opacity: 0; transform: translateX(-50%) translateY(12px); }

  /* ═════════ History page ═════════ */
  .hi-seg { display: inline-flex; background: rgba(29,26,20,0.05); border-radius: 999px; padding: 2px; }
  body.dark .hi-seg, body[data-atmos="night"] .hi-seg, body[data-atmos="ink"] .hi-seg { background: rgba(255,255,255,0.05); }

  // Role keys used inside a team (distinct from the global admin roles).
  const ROLE_KEYS = ['owner', 'admin', 'member', 'viewer'];
  const ROLE_LABEL = { owner: '所有者', admin: '管理员', member: '成员', viewer: '只读' };
  const ROLE_SHORT = { owner: '所', admin: '管', member: '员', viewer: '读' };

  // Map a member's free-text role string → canonical role key.
  const labelToKey = (label) => {
    if (!label) return 'member';
    if (label.includes('所有') || label.toLowerCase().includes('owner')) return 'owner';
    if (label.includes('管理') || label.toLowerCase().includes('admin')) return 'admin';
    if (label.includes('只读') || label.includes('查看') || label.toLowerCase().includes('view')) return 'viewer';
    return 'member';
  };

  // Lightweight, content-focused permissions — what each role may do to TEAM CONTENT.
  // (Tenant/billing/connector permissions stay in the global admin console.)
  const CONTENT_PERMS = [
    { group: '项目', icon: 'folder', items: [
      { id: 'project.create', name: '创建项目',        hint: '新建项目并设为团队可见' },
      { id: 'project.edit',   name: '编辑项目',        hint: '修改名称、简介、阶段、成员' },
      { id: 'project.delete', name: '归档 / 删除项目',  hint: '不可逆，仅高权限可用' },
    ]},
    { group: '知识库', icon: 'doc', items: [
      { id: 'kb.upload', name: '上传知识',     hint: '新增文件供团队助手引用' },
      { id: 'kb.edit',   name: '编辑知识条目', hint: '重命名、改分类' },
      { id: 'kb.delete', name: '删除知识条目', hint: '从团队知识库移除' },
    ]},
    { group: '会话 & 助手', icon: 'sparkle', items: [
      { id: 'convo.pin',    name: '置顶 / 取消置顶会话', hint: '管理团队首页置顶' },
      { id: 'agent.manage', name: '增删共享助手',        hint: '调整团队可用的助手' },
    ]},
    { group: '成员', icon: 'user', items: [
      { id: 'member.invite', name: '邀请成员',   hint: '通过链接 / 邮箱 / SSO' },
      { id: 'member.role',   name: '调整成员角色', hint: '升降级团队内成员' },
      { id: 'member.remove', name: '移除成员',   hint: '将成员移出团队' },
    ]},
  ];

  const ALL_PERM_IDS = CONTENT_PERMS.flatMap(g => g.items.map(i => i.id));

  // Default policy: which role keys hold each permission out of the box.
  const DEFAULT_POLICY = {
    'project.create': ['owner', 'admin', 'member'],
    'project.edit':   ['owner', 'admin', 'member'],
    'project.delete': ['owner', 'admin'],
    'kb.upload':      ['owner', 'admin', 'member'],
    'kb.edit':        ['owner', 'admin', 'member'],
    'kb.delete':      ['owner', 'admin'],
    'convo.pin':      ['owner', 'admin', 'member'],
    'agent.manage':   ['owner', 'admin'],
    'member.invite':  ['owner', 'admin'],
    'member.role':    ['owner', 'admin'],
    'member.remove':  ['owner'],
  };

  // Ensure every team carries a complete, mutable policy object.
  const ensurePolicy = (team) => {
    if (!team) return;
    if (!team.policy) team.policy = {};
    ALL_PERM_IDS.forEach(pid => {
      if (!Array.isArray(team.policy[pid])) {
        team.policy[pid] = [...(DEFAULT_POLICY[pid] || [])];
      }
    });
  };

  // The current user's role key WITHIN a given team.
  const roleKeyOf = (team, user) => {
    if (!team || !user) return 'member';
    const m = (team.members || []).find(x => x.handle === user.handle);
    if (m) return labelToKey(m.role);
    // fall back to the team's own role label (set on the team object)
    return labelToKey(team.role);
  };

  // Can the current user perform a content action in this team?
  const can = (team, permId, user) => {
    if (!team) return false;
    const key = roleKeyOf(team, user);
    if (key === 'owner') return true; // owners are never locked out of their own team
    const allowed = (team.policy && team.policy[permId]) || DEFAULT_POLICY[permId] || [];
    return allowed.includes(key);
  };

  // Toggle a (perm, role) cell in a team's policy. owner cell is fixed-on.
  const togglePolicy = (team, permId, roleKey) => {
    ensurePolicy(team);
    if (roleKey === 'owner') return; // owner always allowed
    const arr = team.policy[permId];
    const i = arr.indexOf(roleKey);
    if (i >= 0) arr.splice(i, 1);
    else arr.push(roleKey);
  };

  return {
    ROLE_KEYS, ROLE_LABEL, ROLE_SHORT, labelToKey,
    CONTENT_PERMS, ALL_PERM_IDS, DEFAULT_POLICY,
    ensurePolicy, roleKeyOf, can, togglePolicy,
  };
})();

</script>

<script>
// Hermes — Team projects: list + detail
window.HERMES_PROJECTS = (() => {
  const { ref, computed, onMounted, onBeforeUnmount } = Vue;
  const Icon = window.HERMES_ICONS.Icon;
  const { AGENTS } = window.HERMES_DATA;
  const agentById = (id) => AGENTS.find(a => a.id === id) || AGENTS[0];

  const ProjectsTab = {
    name: 'ProjectsTab',
    components: { Icon },
    props: { team: Object, projects: Array, can: { type: Function, default: () => false } },
    emits: ['open-project', 'new-project', 'edit-project', 'delete-project', 'archive-project'],
    setup() {
      const menuFor = ref(null);
      const toggleMenu = (id) => { menuFor.value = menuFor.value === id ? null : id; };
      const closeMenu = () => { menuFor.value = null; };
      onMounted(() => document.addEventListener('click', closeMenu));
      onBeforeUnmount(() => document.removeEventListener('click', closeMenu));
      return { menuFor, toggleMenu };
    },
    template: `
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <div>
            <div style="font-family:var(--font-serif);font-size:22px;font-weight:600;color:var(--ink);">项目 · {{ projects.length }}</div>
            <div style="font-size:12.5px;color:var(--ink-mute);margin-top:2px;">每个项目是一组对话、文件和共享助手围绕同一个目标展开。</div>
          </div>
          <button v-if="can('project.create')" class="btn primary" @click="$emit('new-project')"><icon name="plus" /> 新建项目</button>
        </div>
        <div class="proj-grid">
          <div v-for="p in projects" :key="p.id" class="proj-card-wrap">
            <button class="proj-card" @click="$emit('open-project', p.id)">
              <div class="proj-card-head">
                <div class="proj-icon" :style="{ background: p.color }"><icon :name="p.icon" /></div>
                <div style="min-width:0;flex:1;">
                  <div class="proj-name">{{ p.name }}</div>
                  <div class="proj-handle">@{{ p.handle }}</div>
                </div>
                <span class="proj-status" :class="p.status">
                  <span class="dot"></span>{{ p.status === 'active' ? '进行中' : '已暂停' }}
                </span>
              </div>
              <div class="proj-summary">{{ p.summary }}</div>
              <div class="proj-progress"><div :style="{ width: (p.progress * 100) + '%' }"></div></div>
              <div class="proj-foot">
                <span>{{ Math.round(p.progress * 100) }}% · 截至 {{ p.deadline }}</span>
                <span><icon name="chat" :size="11" /> {{ p.threads }} · <icon name="doc" :size="11" /> {{ p.files }}</span>
              </div>
            </button>
            <div v-if="can('project.edit') || can('project.delete')" style="position:absolute;top:12px;right:12px;">
              <button class="card-menu-btn" @click.stop="toggleMenu(p.id)"><icon name="settings" :size="14" /></button>
              <div v-if="menuFor === p.id" class="menu" style="top:32px;right:0;min-width:170px;" @click.stop>
                <button v-if="can('project.edit')" class="menu-item" @click="$emit('edit-project', p); menuFor = null"><icon name="copy" /> <span class="m-name">编辑项目</span></button>
                <button v-if="can('project.delete')" class="menu-item" @click="$emit('archive-project', p); menuFor = null"><icon name="pin" /> <span class="m-name">{{ p.status === 'active' ? '归档项目' : '重新启用' }}</span></button>
                <div v-if="can('project.delete')" class="menu-sep"></div>
                <button v-if="can('project.delete')" class="menu-item danger" @click="$emit('delete-project', p); menuFor = null"><icon name="close" /> <span class="m-name">删除项目</span></button>
              </div>
            </div>
          </div>
        </div>
        <div v-if="!projects.length" style="padding:48px;text-align:center;color:var(--ink-mute);font-size:13px;">还没有项目。<template v-if="can('project.create')">点击右上角「新建项目」开始。</template></div>
      </div>
    `
  };

  const ProjectPage = {
    name: 'ProjectPage',
    components: { Icon },
    props: { project: Object, team: Object, conversations: Array, currentUser: Object, can: { type: Function, default: () => false } },
    emits: ['back', 'open-convo', 'start-conv', 'pick-agent', 'edit-project', 'delete-project', 'archive-project', 'ask-confirm', 'ai-handoff'],
    setup(props, { emit }) {
      const projConvos = computed(() => props.conversations.filter(c => c.projectId === props.project.id));
      const projMembers = computed(() => {
        return (props.project.members || []).map(h => (props.team.members || []).find(m => m.handle === h)).filter(Boolean);
      });
      const memberByHandle = (h) => (props.team.members || []).find(m => m.handle === h);

      // ---- Tasks ----
      const STATUS_NEXT = { todo: 'doing', doing: 'done', done: 'todo' };
      const STATUS_LABEL = { todo: '待办', doing: '进行中', done: '已完成' };
      const cycleStatus = (t) => { if (props.can('project.edit')) t.status = STATUS_NEXT[t.status] || 'todo'; };
      const taskStats = computed(() => {
        const ts = props.project.tasks || [];
        return { done: ts.filter(t => t.status === 'done').length, total: ts.length };
      });

      const editingTaskId = ref(null);
      const editDraft = ref('');
      const startEditTask = (t) => { editingTaskId.value = t.id; editDraft.value = t.title; };
      const saveEditTask = (t) => {
        const v = editDraft.value.trim();
        if (v) t.title = v;
        editingTaskId.value = null;
      };

      const newTaskTitle = ref('');
      const addTask = () => {
        const v = newTaskTitle.value.trim();
        if (!v) return;
        if (!props.project.tasks) props.project.tasks = [];
        props.project.tasks.push({
          id: 'tk-' + Math.random().toString(36).slice(2, 7),
          title: v, status: 'todo',
          owner: props.currentUser ? props.currentUser.handle : null,
          agentId: 'cowork',
        });
        newTaskTitle.value = '';
      };
      const deleteTask = (t) => emit('ask-confirm', {
        title: '删除任务', danger: true, confirmText: '删除',
        message: `删除任务「${t.title}」？`,
        onConfirm: () => { props.project.tasks = (props.project.tasks || []).filter(x => x !== t); }
      });
      const taskToAI = (t) => emit('ai-handoff', {
        project: props.project,
        draft: `就项目任务「${t.title}」，帮我推进。请先给出步骤与所需输入：`,
        agentId: t.agentId || 'cowork',
      });

      // ---- Files / docs ----
      const newDocName = ref('');
      const addDoc = () => {
        const v = newDocName.value.trim();
        if (!v) return;
        if (!props.project.docs) props.project.docs = [];
        const ext = (v.split('.').pop() || '').toLowerCase();
        const iconMap = { pdf: 'doc', docx: 'doc', md: 'note', xlsx: 'chart', csv: 'chart', pptx: 'chart', fig: 'sparkle', json: 'cube' };
        props.project.docs.unshift({
          id: 'd-' + Math.random().toString(36).slice(2, 7),
          name: v, kind: ext || 'doc', icon: iconMap[ext] || 'doc',
          size: (Math.round(Math.random() * 900 + 60)) + ' KB',
          by: props.currentUser ? props.currentUser.name : '我', ago: '刚刚',
        });
        props.project.files = (props.project.files || 0) + 1;
        newDocName.value = '';
      };
      const deleteDoc = (d) => emit('ask-confirm', {
        title: '删除文件', danger: true, confirmText: '删除',
        message: `删除「${d.name}」？`,
        detail: '仅从项目文件列表移除。',
        onConfirm: () => {
          props.project.docs = (props.project.docs || []).filter(x => x !== d);
          props.project.files = Math.max(0, (props.project.files || 0) - 1);
        }
      });
      const docToAI = (d) => emit('ai-handoff', {
        project: props.project,
        draft: `请帮我分析项目文件「${d.name}」并给出要点：`,
        agentId: 'analyst',
      });

      // ---- Header menu ----
      const menuOpen = ref(false);
      const toggleMenu = () => { menuOpen.value = !menuOpen.value; };
      const closeMenu = () => { menuOpen.value = false; };
      onMounted(() => document.addEventListener('click', closeMenu));
      onBeforeUnmount(() => document.removeEventListener('click', closeMenu));

      return { projConvos, projMembers, memberByHandle, agentById,
        STATUS_LABEL, cycleStatus, taskStats,
        editingTaskId, editDraft, startEditTask, saveEditTask,
        newTaskTitle, addTask, deleteTask, taskToAI,
        newDocName, addDoc, deleteDoc, docToAI,
        menuOpen, toggleMenu };
    },
    template: `
      <div class="stage">
        <div class="proj-hero">
          <button class="proj-back" @click="$emit('back')"><icon name="back" :size="12" /> 返回 {{ team.name }}</button>
          <div class="proj-hero-row">
            <div class="proj-icon" :style="{ background: project.color }"><icon :name="project.icon" /></div>
            <div class="proj-hero-info">

              <div v-for="t in (project.tasks || [])" :key="t.id" class="task-row" :class="t.status">

                    <span v-if="t.agentId" class="task-agent"><span class="agent-dot" :style="{ background: agentById(t.agentId).color }"></span>{{ agentById(t.agentId).name }}</span>

                  <button class="row-act accent" title="交给助手处理" @click="taskToAI(t)"><icon name="sparkle" :size="13" /></button>
                  <template v-if="can('project.edit')">
                    <button class="row-act" title="重命名" @click="startEditTask(t)"><icon name="copy" :size="13" /></button>
                    <button class="row-act danger" title="删除" @click="deleteTask(t)"><icon name="close" :size="13" /></button>
                  </template>
                </div>
              </div>
              <div v-if="!(project.tasks && project.tasks.length)" style="padding:24px;text-align:center;color:var(--ink-mute);font-size:12.5px;">还没有任务。</div>

          <div class="col-grid">
            <div style="display:flex;flex-direction:column;gap:18px;">

              <div class="section-card">

                  <button class="section-link" @click="$emit('start-conv', project)">新对话 <icon name="plus" :size="11" /></button>
                </div>
                <div class="section-body">
                  <div v-if="!projConvos.length" style="padding:32px;text-align:center;color:var(--ink-mute);font-size:13px;">

                  <div v-for="c in projConvos" :key="c.id" class="row-item" @click="$emit('open-convo', c.id)">
                    <div class="convo-ico" :style="{ background: agentById(c.agentId).color + '22', color: agentById(c.agentId).color }">
                      <icon :name="agentById(c.agentId).icon" />
                    </div>
                    <div class="row-text">
                      <div class="row-title">{{ c.title }}</div>
                      <div class="row-sub">{{ agentById(c.agentId).name }} · {{ c.updated }}</div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Files -->
              <div class="section-card">
                <div class="section-head">
                  <div class="section-title"><icon name="doc" /> 项目文件</div>
                </div>
                <div class="section-body flush">
                  <div v-for="d in (project.docs || [])" :key="d.id" class="file-row has-actions">
                    <div class="file-ico"><icon :name="d.icon" /></div>
                    <div style="flex:1;min-width:0;">
                      <div class="row-title">{{ d.name }}</div>
                      <div class="file-meta">{{ d.size }} · {{ d.by }} · {{ d.ago }}</div>
                    </div>
                    <span class="file-kind">{{ d.kind }}</span>
                    <div class="row-actions">
                      <button class="row-act accent" title="用助手分析" @click="docToAI(d)"><icon name="sparkle" :size="13" /></button>
                      <button v-if="can('project.edit')" class="row-act danger" title="删除" @click="deleteDoc(d)"><icon name="close" :size="13" /></button>
                    </div>
                  </div>
                  <div v-if="!(project.docs && project.docs.length)" style="padding:24px;text-align:center;color:var(--ink-mute);font-size:12.5px;">还没有文件。</div>
                  <div v-if="can('project.edit')" class="task-add">
                    <icon name="paperclip" :size="14" style="color:var(--ink-mute);" />
                    <input class="task-add-input" v-model="newDocName" placeholder="添加文件名，例如 路演脚本.docx…" @keydown.enter="addDoc" />
                    <button v-if="newDocName.trim()" class="btn primary" style="height:28px;padding:0 12px;" @click="addDoc">添加</button>
                  </div>
                </div>
              </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:18px;">
              <div class="section-card">
                <div class="section-head"><div class="section-title"><icon name="sparkle" /> 项目助手</div></div>
                <div class="agent-mini-grid">
                  <button v-for="id in project.pinnedAgents" :key="id" class="agent-mini" @click="$emit('pick-agent', agentById(id))">
                    <div class="agent-icon" :style="{ background: agentById(id).color }"><icon :name="agentById(id).icon" /></div>
                    <div style="min-width:0;flex:1;">
                      <div class="nm">{{ agentById(id).name }}</div>
                      <div class="ds">{{ agentById(id).desc }}</div>
                    </div>
                  </button>
                </div>
              </div>

              <div class="section-card">
                <div class="section-head"><div class="section-title"><icon name="user" /> 项目成员</div></div>
                <div class="section-body">
                  <div v-for="m in projMembers" :key="m.handle" class="row-item">
                    <div class="mem-avatar" :style="{ background: m.color }">{{ m.initials }}<span class="status" :class="m.status"></span></div>
                    <div class="row-text">
                      <div class="row-title">{{ m.name }}</div>
                      <div class="row-sub">{{ m.role }}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `,
    methods: {
      sectionLabel(s) {
        const map = { concept: '概念与方向', logo: '标识系统', voice: '声音与语气', rollout: '上线节奏',
          audit: '现状盘点', spec: '规范定义', set: '图标集',
          deck: '路演 PPT', bp: '一页 BP', demo: '演示脚本', press: '媒体材料',
          metric: '指标定义', baseline: '基线数据' };
        return map[s] || s;
      }
    }
  };

  return { ProjectsTab, ProjectPage };
})();

</script>

<script>
// Hermes — Team workspace page
window.HERMES_TEAM = (() => {
  const { ref, computed, onMounted, onBeforeUnmount } = Vue;
  const Icon = window.HERMES_ICONS.Icon;
  const { AGENTS } = window.HERMES_DATA;
  const agentById = (id) => AGENTS.find(a => a.id === id) || AGENTS[0];

  const TeamPage = {
    name: 'TeamPage',
    components: { Icon, ProjectsTab: window.HERMES_PROJECTS.ProjectsTab },
    props: {
      team: Object,
      projects: { type: Array, default: () => [] },
      currentUser: Object,
      can: { type: Function, default: () => false },
      myRole: { type: String, default: 'member' },
      gov: { type: Object, default: () => ({}) },
    },
    emits: ['open-convo', 'pick-agent', 'invite', 'open-project', 'start-conv', 'new-project',
            'edit-project', 'delete-project', 'archive-project',
            'kb-add', 'kb-edit', 'kb-delete', 'agent-add', 'agent-remove',
            'member-role', 'member-remove', 'unpin', 'toggle-policy', 'reset-policy'],
    setup(props) {
      const tab = ref('overview');
      const tabs = [
        { id: 'overview',  label: '概览' },
        { id: 'projects',  label: '项目', countKey: '__projects' },
        { id: 'members',   label: '成员', countKey: 'members' },
        { id: 'agents',    label: '共享助手', countKey: 'agents' },
        { id: 'knowledge', label: '知识库', countKey: 'knowledge' },
        { id: 'activity',  label: '活动' },
        { id: 'settings',  label: '设置' },
      ];
      const roleLabel = computed(() => ({ owner: '所有者', admin: '管理员', member: '成员' }[props.team.role] || '成员'));
      const projCount = computed(() => props.projects.length);
      const menuFor = ref(null); // member handle whose row-menu is open
      const ROLE_OPTIONS = ['管理员', '成员', '只读'];
      const canEditPolicy = computed(() => props.myRole === 'owner' || props.myRole === 'admin');
      const toggleMenu = (h) => { menuFor.value = menuFor.value === h ? null : h; };
      const myInitials = computed(() => props.currentUser ? props.currentUser.initials : '');
      const closeMenu = () => { menuFor.value = null; };
      onMounted(() => document.addEventListener('click', closeMenu));
      onBeforeUnmount(() => document.removeEventListener('click', closeMenu));
      return { tab, tabs, roleLabel, agentById, projCount, menuFor, toggleMenu, ROLE_OPTIONS, canEditPolicy, myInitials };
    },
    template: `
      <div class="stage">
        <div class="team-hero">
          <div class="team-hero-row">
            <div class="team-shield" :style="{ background: 'linear-gradient(180deg,' + team.color + ',' + shade(team.color, -20) + ')' }">
              <icon :name="team.icon" />
            </div>
            <div class="team-info">
              <div class="team-crumb">团队 · TEAM</div>
              <h1 class="team-name">{{ team.name }}<span class="handle">@{{ team.handle }}</span></h1>
              <div class="team-tagline">{{ team.tagline }}</div>
              <div class="team-meta-row">
                <span class="role-pill">{{ roleLabel }}</span>
                <span><icon name="user" /> {{ team.stats.members }} 位成员</span>
                <span><icon name="sparkle" /> {{ team.stats.agents }} 个共享助手</span>
                <span><icon name="clock" /> {{ team.created }}</span>
                <span><icon name="star" /> {{ team.plan }}</span>
              </div>
            </div>
            <div class="team-actions">
              <div class="mem-stack" style="margin-right:8px;">
                <div v-for="m in team.members.slice(0,4)" :key="m.handle"
                     class="mem-avatar" :style="{ background: m.color }" :title="m.name">
                  {{ m.initials }}
                </div>
                <div v-if="team.members.length > 4" class="mem-more">+{{ team.members.length - 4 }}</div>
              </div>
              <button v-if="can('member.invite')" class="btn" @click="$emit('invite', team)"><icon name="plus" /> 邀请成员</button>
              <button class="btn primary" @click="$emit('start-conv', null)"><icon name="chat" /> 在团队中开会话</button>
              <button class="icon-btn" @click="tab = 'settings'" title="团队设置"><icon name="settings" /></button>
            </div>
          </div>
          <div class="team-tabs">
            <button v-for="t in tabs" :key="t.id"
                    class="team-tab" :class="{active: tab === t.id}"
                    @click="tab = t.id">
              {{ t.label }}
              <span v-if="t.countKey === '__projects'" class="pill">{{ projCount }}</span>

                    <div class="section-title"><icon name="sparkle" /> 共享助手</div>

                <div class="section-card">
                  <div class="section-head">
                    <div class="section-title"><icon name="pin" /> 团队置顶</div>
                    <button class="section-link" @click="tab = 'activity'">管理 <icon name="chevron_right" /></button>
                  </div>
                  <div class="section-body">
                    <div v-if="!team.pinned || !team.pinned.length" style="padding:24px;text-align:center;color:var(--ink-mute);font-size:12.5px;">还没有置顶会话。</div>
                    <div v-for="c in team.pinned" :key="c.id" class="row-item has-actions" @click="$emit('open-convo', c.id)">
                      <div class="convo-ico" :style="{ background: agentById(c.agentId).color + '22', color: agentById(c.agentId).color }">
                        <icon :name="agentById(c.agentId).icon" />
                      </div>
                      <div class="row-text">
                        <div class="row-title">{{ c.title }}</div>
                        <div class="row-sub">{{ agentById(c.agentId).name }} · {{ c.updated }}</div>

                      <div class="row-actions">
                        <button v-if="can('convo.pin')" class="row-act danger" title="取消置顶" @click.stop="$emit('unpin', c.id)"><icon name="close" :size="13" /></button>
                        <icon name="chevron_right" style="width:14px;height:14px;color:var(--ink-mute);" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- RIGHT col -->
              <div style="display:flex;flex-direction:column;gap:18px;">

                <div class="section-card">
                  <div class="section-head">
                    <div class="section-title"><icon name="user" /> 成员</div>

                        <div class="row-title">{{ m.name }} <span style="color:var(--ink-mute);font-weight:400;font-size:11.5px;margin-left:4px;">@{{ m.handle }}</span></div>
                        <div class="row-sub">{{ m.last }}</div>
                      </div>
                      <span class="mem-role" :class="roleClass(m.role)">{{ m.role }}</span>
                    </div>
                  </div>
                </div>

                <!-- Activity -->
                <div class="section-card">
                  <div class="section-head">
                    <div class="section-title"><icon name="bolt" /> 最近活动</div>
                    <button class="section-link" @click="tab = 'activity'">全部 <icon name="chevron_right" /></button>

                    <div v-for="(a, i) in team.activity.slice(0, 5)" :key="i" class="activity-item">

                        <div class="activity-time">{{ a.ago }}</div>

                    <div class="section-title"><icon name="doc" /> 知识库</div>

                  <template v-for="g in gov.CONTENT_PERMS" :key="g.group">

                        <button class="perm-cell"
                                :class="{ on: (team.policy[p.id] || []).includes(rk) || rk === 'owner', locked: rk === 'owner' || !canEditPolicy }"
                                :disabled="rk === 'owner' || !canEditPolicy"
                                @click="$emit('toggle-policy', {permId: p.id, roleKey: rk})">
                          <icon v-if="(team.policy[p.id] || []).includes(rk) || rk === 'owner'" name="check" :size="11" />
                        </button>
                      </div>
                    </template>
                  </template>
                </div>
              </div>
            </div>

            <div class="section-card" style="margin-top:14px;">
              <div class="section-head"><div class="section-title" style="color:var(--danger);">危险区</div></div>
              <div style="padding:16px 18px;display:flex;align-items:center;justify-content:space-between;">
                <div>
                  <div style="font-weight:600;color:var(--ink);">解散团队</div>
                  <div style="font-size:12px;color:var(--ink-mute);margin-top:2px;">将删除所有团队会话、共享助手与知识条目。不可恢复。</div>
                </div>
                <button class="btn" :disabled="myRole !== 'owner'" :style="myRole === 'owner' ? 'color:var(--danger);border-color:var(--danger);' : ''">解散</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    `,
    methods: {
      roleClass(r) {
        if (r.includes('所有')) return 'owner';
        if (r.includes('管理')) return 'admin';
        return '';
      },
      statusLabel(s) { return { online: '在线', idle: '离开', offline: '离线' }[s] || s; },
    }
  };

  // simple shade helper
  function shade(hex, percent) {
    const c = hex.replace('#', '');
    const r = parseInt(c.slice(0,2), 16);
    const g = parseInt(c.slice(2,4), 16);
    const b = parseInt(c.slice(4,6), 16);
    const adj = (n) => Math.max(0, Math.min(255, Math.round(n + (percent/100) * 255)));
    return '#' + [adj(r), adj(g), adj(b)].map(v => v.toString(16).padStart(2,'0')).join('');
  }
  // expose to template via methods.shade
  TeamPage.methods = TeamPage.methods || {};
  TeamPage.methods.shade = shade;

  return { TeamPage };
})();

</script>
