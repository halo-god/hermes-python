<script>
// Hermes — Conversation history directory + management (delete / pin / rename / bulk)
window.HERMES_HISTORY = (() => {
  const { ref, computed } = Vue;
  const Icon = window.HERMES_ICONS.Icon;

  const HistoryPage = {
    name: 'HistoryPage',
    components: { Icon },
    props: { conversations: Array, agentLookup: Function, teams: Array, projects: Array },
    emits: ['open-convo', 'delete', 'delete-many', 'toggle-pin', 'rename', 'new-chat'],
    setup(props, { emit }) {
      const q = ref('');
      const scope = ref('all');      // all | pinned | team | personal
      const sortBy = ref('recent');  // recent | name | agent
      const selected = ref(new Set());
      const selectMode = ref(false);
      const editingId = ref(null);
      const editText = ref('');

      const teamName = (id) => (props.teams.find(t => t.id === id) || {}).name;
      const projName = (id) => (props.projects.find(p => p.id === id) || {}).name;

      const base = computed(() => {
        let list = props.conversations.slice();
        const term = q.value.trim().toLowerCase();
        if (term) list = list.filter(c => c.title.toLowerCase().includes(term) || (props.agentLookup(c.agentId).name || '').toLowerCase().includes(term));
        if (scope.value === 'pinned') list = list.filter(c => c.pinned);
        else if (scope.value === 'team') list = list.filter(c => c.teamId || c.projectId);
        else if (scope.value === 'personal') list = list.filter(c => !c.teamId && !c.projectId);
        if (sortBy.value === 'name') list.sort((a, b) => a.title.localeCompare(b.title, 'zh'));
        else if (sortBy.value === 'agent') list.sort((a, b) => props.agentLookup(a.agentId).name.localeCompare(props.agentLookup(b.agentId).name, 'zh'));
        return list;
      });

      // group by a coarse "bucket" derived from the updated label
      const groups = computed(() => {
        const order = ['今天', '昨天', '本周', '更早'];
        const bucketOf = (u) => {
          if (!u) return '更早';
          if (u.includes('刚刚') || u.includes('今天') || /^\d{1,2}:\d{2}/.test(u) || u.includes('分钟') || u.includes('小时')) return '今天';
          if (u.includes('昨天')) return '昨天';
          if (u.includes('周') || u.includes('本周')) return '本周';
          return '更早';
        };
        const map = {};
        base.value.forEach(c => { const b = bucketOf(c.updated); (map[b] = map[b] || []).push(c); });
        return order.filter(o => map[o] && map[o].length).map(o => ({ label: o, items: map[o] }));
      });

      const totalMsgs = (c) => (c.messages || []).length;

      const toggleSel = (id) => {
        const s = new Set(selected.value);
        if (s.has(id)) s.delete(id); else s.add(id);
        selected.value = s;
        if (s.size && !selectMode.value) selectMode.value = true;
      };
      const allVisibleIds = computed(() => base.value.map(c => c.id));
      const allSelected = computed(() => allVisibleIds.value.length > 0 && allVisibleIds.value.every(id => selected.value.has(id)));
      const toggleAll = () => {
        if (allSelected.value) selected.value = new Set();
        else selected.value = new Set(allVisibleIds.value);
      };
      const clearSel = () => { selected.value = new Set(); selectMode.value = false; };

      const startRename = (c) => { editingId.value = c.id; editText.value = c.title; };
      const commitRename = (c) => {
        const t = editText.value.trim();
        if (t && t !== c.title) emit('rename', { id: c.id, title: t });
        editingId.value = null;
      };

      const bulkDelete = () => emit('delete-many', [...selected.value]);

      return { q, scope, sortBy, selected, selectMode, editingId, editText,
        base, groups, teamName, projName, totalMsgs, toggleSel, allSelected, toggleAll, clearSel,
        startRename, commitRename, bulkDelete };
    },
    template: `
      <div class="stage">
        <div class="team-hero">
          <div class="team-hero-row" style="align-items:center;">
            <div class="team-shield" style="background:linear-gradient(180deg,#2a241a,#15110b);color:var(--accent);">
              <icon name="list" :size="28" />
            </div>
            <div class="team-info">
              <div class="team-crumb">历史 · ALL CONVERSATIONS</div>
              <h1 class="team-name">所有会话</h1>
              <div class="team-tagline">共 {{ conversations.length }} 段对话 · 在此搜索、整理与清理</div>
            </div>
            <div class="team-actions">
              <button class="btn primary" @click="$emit('new-chat')"><icon name="plus" /> 新会话</button>
            </div>
          </div>
        </div>

        <div class="team-body" style="max-width:1080px;">
          <!-- toolbar -->
          <div class="users-toolbar" style="margin-bottom:16px;">
            <div class="filter-input" style="width:280px;">
              <icon name="search" />
              <input v-model="q" placeholder="按标题或助手搜索会话…" />
            </div>
            <div class="hi-seg">
              <button v-for="o in [['all','全部'],['pinned','已置顶'],['team','团队/项目'],['personal','个人']]" :key="o[0]"
                      :class="{active: scope === o[0]}" @click="scope = o[0]">{{ o[1] }}</button>
            </div>
            <span style="flex:1;"></span>
            <button class="filter-select" @click="sortBy = sortBy === 'recent' ? 'name' : (sortBy === 'name' ? 'agent' : 'recent')">
              排序：{{ { recent: '最近活动', name: '标题', agent: '助手' }[sortBy] }} <icon name="chevron_down" />
            </button>
            <button class="filter-select" :class="{on: selectMode}" @click="selectMode ? clearSel() : (selectMode = true)">
              <icon name="check" /> {{ selectMode ? '退出选择' : '批量管理' }}
            </button>
          </div>

          <!-- bulk bar -->
          <transition name="savebar">
            <div v-if="selectMode" class="hi-bulkbar">
              <label class="login-remember" style="margin:0;">
                <span class="login-check" :class="{on: allSelected}" @click="toggleAll"><icon v-if="allSelected" name="check" :size="11" /></span>
                全选当前 {{ base.length }} 项
              </label>
              <span style="flex:1;"></span>
              <span style="font-size:12.5px;color:var(--ink-mute);">已选 {{ selected.size }} 项</span>
              <button class="btn" :disabled="!selected.size" @click="$emit('delete-many', [...selected].filter((_,i)=>true), 'archive')" style="display:none;"></button>
              <button class="btn" :disabled="!selected.size" style="color:var(--danger);border-color:var(--rule);" @click="bulkDelete">
                <icon name="close" /> 删除所选
              </button>
            </div>
          </transition>

          <!-- empty -->
          <div v-if="!base.length" class="hi-empty">
            <icon name="search" :size="22" />
            <div style="margin-top:10px;font-family:var(--font-serif);font-size:18px;color:var(--ink);">没有匹配的会话</div>
            <div style="font-size:12.5px;margin-top:4px;">换个关键词，或切换筛选范围。</div>
          </div>

          <!-- grouped list -->
          <div v-for="g in groups" :key="g.label" class="hi-group">
            <div class="hi-group-label">{{ g.label }} <span>{{ g.items.length }}</span></div>
            <div class="hi-list">
              <div v-for="c in g.items" :key="c.id" class="hi-row" :class="{ sel: selected.has(c.id) }">
                <span v-if="selectMode" class="login-check hi-check" :class="{on: selected.has(c.id)}" @click="toggleSel(c.id)">
                  <icon v-if="selected.has(c.id)" name="check" :size="11" />
                </span>
                <div class="hi-seal" :style="{ background: agentLookup(c.agentId).color }"><icon :name="c.icon || agentLookup(c.agentId).icon" :size="14" /></div>
                <div class="hi-main" @click="editingId === c.id ? null : $emit('open-convo', c.id)">
                  <div class="hi-title-row">
                    <input v-if="editingId === c.id" class="task-edit-input" v-model="editText"
                           @keydown.enter="commitRename(c)" @keydown.esc="editingId = null" @blur="commitRename(c)"
                           @click.stop ref="renameInput" />
                    <template v-else>
                      <span class="hi-title">{{ c.title }}</span>
                      <icon v-if="c.pinned" name="pin" :size="11" style="color:var(--accent-deep);flex-shrink:0;" />
                    </template>
                  </div>
                  <div class="hi-meta">
                    <span class="hi-agent"><span class="agent-dot" :style="{ background: agentLookup(c.agentId).color }"></span>{{ agentLookup(c.agentId).name }}</span>
                    <span v-if="c.projectId" class="hi-tag proj"><icon name="folder" :size="10" /> {{ projName(c.projectId) }}</span>
                    <span v-else-if="c.teamId" class="hi-tag team"><icon name="user" :size="10" /> {{ teamName(c.teamId) }}</span>
                    <span class="hi-dim">{{ totalMsgs(c) }} 条消息</span>
                  </div>
                </div>
                <div class="hi-updated">{{ c.updated }}</div>
                <div class="hi-actions">
                  <button class="icon-btn" :title="c.pinned ? '取消置顶' : '置顶'" @click.stop="$emit('toggle-pin', c.id)">
                    <icon name="pin" :style="c.pinned ? { color: 'var(--accent-deep)' } : {}" />
                  </button>
                  <button class="icon-btn" title="重命名" @click.stop="startRename(c)"><icon name="note" /></button>
                  <button class="icon-btn" title="删除" @click.stop="$emit('delete', c.id)" style="color:var(--danger);"><icon name="close" /></button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `
  };

  return { HistoryPage };
})();

</script>

        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
          e.preventDefault();

      onMounted(() => {
        autoresize();

        document.addEventListener('mousedown', onDocClick);

      onBeforeUnmount(() => document.removeEventListener('mousedown', onDocClick));

  // ───────── Conversation seal — deterministic procedural sigil ─────────
  const ConvoSeal = {
    name: 'ConvoSeal',
    props: ['seed', 'size'],
    setup(props) {
      const seal = computed(() => {
        const id = props.seed || 'x';
        let h = 0;
        for (let i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
        const rand = (n) => { h = (h * 1103515245 + 12345) & 0x7fffffff; return h % n; };
        const segs = 8 + rand(6);
        const slices = [];
        for (let i = 0; i < segs; i++) slices.push(rand(100) < 55 ? 1 : 0);
        const inner = rand(3); // inner glyph variant
        const ringStyle = rand(3); // 0 solid, 1 dashed, 2 double
        const glyphs = ['卄','匕','卩','彡','爻','勹','匚','囗','日','月','山','水','火','一'];
        const glyph = glyphs[rand(glyphs.length)];
        return { segs, slices, inner, ringStyle, glyph };
      });
      return { seal };
    },
    template: `
      <svg :width="size || 36" :height="size || 36" viewBox="-50 -50 100 100" class="convo-seal" :aria-label="'seal ' + seed">
        <!-- outer ring -->
        <circle cx="0" cy="0" r="46"
                :fill="'none'"
                :stroke="'var(--accent)'"
                :stroke-width="seal.ringStyle === 2 ? 1.2 : 1.6"
                :stroke-dasharray="seal.ringStyle === 1 ? '3 3' : (seal.ringStyle === 2 ? '0' : '0')" />
        <circle v-if="seal.ringStyle === 2" cx="0" cy="0" r="42" fill="none" stroke="var(--accent)" stroke-width="0.8" />
        <!-- petal slices -->
        <g v-for="(s, i) in seal.slices" :key="i">
          <path v-if="s"
                :d="petal(i, seal.segs)"
                :fill="i % 2 === 0 ? 'var(--accent)' : 'var(--accent-deep)'"
                :opacity="i % 3 === 0 ? 0.85 : 0.55" />
        </g>
        <!-- inner circle -->
        <circle cx="0" cy="0" r="20" fill="var(--bg-panel)" stroke="var(--accent-deep)" stroke-width="0.8" />
        <!-- glyph -->
        <text x="0" y="2" text-anchor="middle" dominant-baseline="middle"
              font-family="var(--font-serif)" font-size="26" font-weight="600"
              fill="var(--accent-deep)">{{ seal.glyph }}</text>
        <!-- center dot -->
        <circle v-if="seal.inner === 0" cx="0" cy="32" r="2" fill="var(--accent-deep)" />
      </svg>
    `,
    methods: {
      petal(i, n) {
        const a0 = (i / n) * Math.PI * 2 - Math.PI / 2;
        const a1 = ((i + 1) / n) * Math.PI * 2 - Math.PI / 2;
        const r0 = 22, r1 = 40;
        const x0 = Math.cos(a0) * r0, y0 = Math.sin(a0) * r0;
        const x1 = Math.cos(a0) * r1, y1 = Math.sin(a0) * r1;
        const x2 = Math.cos(a1) * r1, y2 = Math.sin(a1) * r1;
        const x3 = Math.cos(a1) * r0, y3 = Math.sin(a1) * r0;
        return `M ${x0} ${y0} L ${x1} ${y1} A 40 40 0 0 1 ${x2} ${y2} L ${x3} ${y3} A 22 22 0 0 0 ${x0} ${y0} Z`;
      }
    }
  };

            <button class="twk-preset" :class="{active: tweaks.voice === 'engineering'}" @click="$emit('update', {voice: 'engineering'})">
              <div class="swatch voice engineering">$ —</div>工程
            </button>
          </div>
        </div>
      </div>
    `,
    computed: {
      atmosHint() { return { letter: '温润的纸面', cinnabar: '一点朱砂红', celadon: '雨过天青色', night: '静谧的深夜', ink: '幽蓝的墨色' }[this.tweaks.atmos] || ''; },
      densityHint() { return { loose: '从容铺开', normal: '正合适', tight: '不浪费每一寸' }[this.tweaks.density] || ''; },
      voiceHint() { return { classical: '简练有古意', warm: '像同事在说话', engineering: '只说事实' }[this.tweaks.voice] || ''; },
    }
  };

  // ───────── Root App ─────────
  const App = {
    name: 'HermesApp',
    components: { Icon, Sidebar, AgentSwitcher, Composer, AgentsGrid, HermesMessage: Message, SearchPalette, TweaksPanel, TeamPage, ProjectPage, TeamCompose, Workspace, AdminPage, ConvoSeal, NewProjectModal, InviteMembersModal, ConfirmModal, KnowledgeModal, AgentPickerModal, NewTeamModal, LoginPage, UserProfilePage, HistoryPage },
    setup() {
      const view = ref('landing'); // landing | thread | schedule | team | project | team-compose | admin | profile | history
      const authed = ref(false);   // login gate
      const loginMethod = ref('local');
      const conversations = ref(JSON.parse(JSON.stringify(CONVERSATIONS)));
      const teams = ref(JSON.parse(JSON.stringify(TEAMS)));
      teams.value.forEach(t => GOV.ensurePolicy(t));
      const projects = ref(JSON.parse(JSON.stringify(PROJECTS)));
      const activeTeamId = ref(null);
      const activeProjectId = ref(null);
      const composeProjectId = ref(null);
      const workspaceOpen = ref(false);
      const activeConvoId = ref(null);
      const draftLanding = ref('');
      const draftThread = ref('');
      const showSearch = ref(false);
      const primaryAgentId = ref('hermes');
      const activeAgentIds = ref(['hermes']);
      const agentTab = ref('全部');
      const activeProfileId = ref(PROFILES[0].id);
      const activeProfile = computed(() => PROFILES.find(p => p.id === activeProfileId.value) || PROFILES[0]);
      const modelOf = (p) => MODELS.find(m => m.id === p.defaultModelId) || MODELS[0];
      const model = computed(() => modelOf(activeProfile.value));
      const acpSessionId = ref('acp-' + Math.random().toString(36).slice(2, 8) + '-' + Date.now().toString(36).slice(-4));
      const pickProfile = (p) => {
        activeProfileId.value = p.id;
        // new ACP session for new profile
        acpSessionId.value = 'acp-' + Math.random().toString(36).slice(2, 8) + '-' + Date.now().toString(36).slice(-4);
      };
      const tweaksOpen = ref(false);
      const tweaks = reactive({
        atmos: 'letter',     // letter | cinnabar | celadon | night | ink
        density: 'normal',   // loose | normal | tight
        voice: 'warm',       // classical | warm | engineering
        sideCollapsed: false,
      });

      // Conversation seal generator — deterministic SVG from id
      const sealFor = (id) => {
        let h = 0;
        for (let i = 0; i < id.length; i++) h = ((h << 5) - h + id.charCodeAt(i)) | 0;
        const rand = (n) => { h = (h * 1103515245 + 12345) & 0x7fffffff; return h % n; };
        const ring = rand(3);
        const segs = 6 + rand(4);
        const slices = [];
        for (let i = 0; i < segs; i++) slices.push((rand(100) < 50) ? 1 : 0);
        return { ring, segs, slices, glyph: ['卄','匕','卩','凵','彡','爻','勹','匚','囗'][rand(9)] };
      };

      const allAgents = AGENTS;
      const activeAgents = computed(() => activeAgentIds.value.map(id => AGENTS.find(a => a.id === id)).filter(Boolean));
      const primaryAgent = computed(() => AGENTS.find(a => a.id === primaryAgentId.value) || AGENTS[0]);

      const filteredAgents = computed(() => {
        if (agentTab.value === '全部') return AGENTS;
        if (agentTab.value === '官方') return AGENTS.filter(a => a.official);
        return AGENTS.filter(a => a.tags && a.tags.includes(agentTab.value));
      });

      const activeConvo = computed(() => conversations.value.find(c => c.id === activeConvoId.value));
      const activeTeam = computed(() => teams.value.find(t => t.id === activeTeamId.value));
      const activeProject = computed(() => projects.value.find(p => p.id === activeProjectId.value));
      const composeProject = computed(() => projects.value.find(p => p.id === composeProjectId.value));

      const openTeam = (id) => {
        activeTeamId.value = id;
        activeProjectId.value = null;
        view.value = 'team';
      };

      const openAdmin = (tab) => {
        view.value = 'admin';
        adminTab.value = tab || 'overview';
      };
      const adminTab = ref('overview');
      const currentUser = ref(CURRENT_USER);

      // ───── Auth: login gate + profile ─────
      const onLogin = ({ method, user }) => {
        loginMethod.value = method;
        if (user) {
          currentUser.value = {
            ...CURRENT_USER,
            name: user.name, handle: user.handle, email: user.email,
            role: user.role, initials: user.initials, color: user.color,
            source: user.source, dept: user.dept, sso: user.sso || [],
          };
        } else {
          currentUser.value = CURRENT_USER;
        }
        authed.value = true;
        view.value = 'landing';
      };
      const doLogout = () => askConfirm({
        title: '退出登录', confirmText: '退出', danger: true,
        message: '确定要退出当前账号吗？',
        detail: '本次未保存的草稿会丢失，已发送的会话不受影响。',
        onConfirm: () => {
          authed.value = false;
          activeConvoId.value = null;
          view.value = 'landing';
        }
      });
      const openProfile = () => { view.value = 'profile'; };

      // ───── History: open / delete / pin / rename ─────
      const openHistory = () => { view.value = 'history'; showSearch.value = false; };
      const deleteConvo = (id) => {
        const c = conversations.value.find(x => x.id === id);
        askConfirm({
          title: '删除会话', danger: true, confirmText: '删除',
          message: `确定删除「${c ? c.title : '该会话'}」吗？`,
          detail: '会话内容与生成的文件将一并移除，不可恢复。',
          onConfirm: () => {
            conversations.value = conversations.value.filter(x => x.id !== id);
            if (activeConvoId.value === id) { activeConvoId.value = null; if (view.value === 'thread') view.value = 'landing'; }
            showToast('已删除会话');
          }
        });
      };
      const deleteConvos = (ids) => {
        if (!ids || !ids.length) return;
        askConfirm({
          title: '批量删除会话', danger: true, confirmText: `删除 ${ids.length} 项`,
          message: `确定删除选中的 ${ids.length} 段会话吗？`,
          detail: '这些会话及其生成的文件将一并移除，不可恢复。',
          onConfirm: () => {
            const set = new Set(ids);
            conversations.value = conversations.value.filter(x => !set.has(x.id));
            if (set.has(activeConvoId.value)) { activeConvoId.value = null; if (view.value === 'thread') view.value = 'landing'; }
            showToast(`已删除 ${ids.length} 段会话`);
          }
        });
      };
      const togglePinConvo = (id) => {
        const c = conversations.value.find(x => x.id === id);
        if (c) { c.pinned = !c.pinned; showToast(c.pinned ? '已置顶' : '已取消置顶'); }
      };
      const renameConvo = ({ id, title }) => {
        const c = conversations.value.find(x => x.id === id);
        if (c) { c.title = title; showToast('已重命名'); }
      };

      // ───── Composer attach + open-project ─────
      const onAttach = (kind) => {
        const map = { file: '已选择本地文件（演示）', folder: '已从文件夹选择（演示）', kb: '已引用知识库条目（演示）', link: '已粘贴网页链接（演示）' };
        showToast(map[kind] || '已添加附件（演示）');
      };
      const openProjectWork = () => {
        const t = activeTeamId.value ? activeTeam.value : teams.value[0];
        if (t) { openTeam(t.id); showToast('在「' + t.name + '」中选择一个项目开始'); }
        else view.value = 'team';
      };

      // ───── Create team ─────
      const newTeamOpen = ref(false);
      const createTeam = (data) => {
        const id = 't-' + Math.random().toString(36).slice(2, 8);
        const owner = {
          name: currentUser.value.name, handle: currentUser.value.handle, role: '所有者',
          color: currentUser.value.color, initials: currentUser.value.initials,
          status: 'online', last: '刚刚',
        };
        const team = {
          id, name: data.name, handle: data.handle, color: data.color, icon: data.icon,
          tagline: data.tagline, role: 'owner',
          created: '刚刚 · 由你创建',
          plan: data.plan === 'business' ? 'Hermes 商业版 · 席位不限' : 'Hermes 团队版 · 已使用 1 / 20 席位',
          stats: { members: 1 + (data.invites ? data.invites.length : 0), agents: data.sharedAgents.length, threads: 0, knowledge: 0 },
          members: [owner],
          sharedAgents: [...data.sharedAgents],
          activity: [{ who: currentUser.value.name, action: '创建了团队', target: '「' + data.name + '」', verb: '', ago: '刚刚', icon: 'sparkle' }],
          knowledge: [], pinned: [],
        };
        GOV.ensurePolicy(team);
        teams.value.unshift(team);
        newTeamOpen.value = false;
        showToast(`已创建团队「${team.name}」${data.invites && data.invites.length ? '，已发送 ' + data.invites.length + ' 份邀请' : ''}`);
        openTeam(id);
      };

      const openProject = (id) => {
        const p = projects.value.find(x => x.id === id);
        if (!p) return;
        activeTeamId.value = p.teamId;
        activeProjectId.value = id;
        view.value = 'project';
      };

      // Modal state
      const newProjectFor = ref(null);   // team object | null
      const inviteFor     = ref(null);   // team object | null
      const toast         = ref(null);   // { text, kind } | null
      let toastTimer = null;
      const showToast = (text, kind) => {
        toast.value = { text, kind: kind || 'ok' };
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toast.value = null; }, 2800);
      };

      const openNewProject = (team) => { newProjectFor.value = team || activeTeam.value; };
      const openInvite     = (team) => { inviteFor.value     = team || activeTeam.value; };

      const createProject = (data) => {
        const id = 'p-' + Math.random().toString(36).slice(2, 8);
        const p = {
          id, teamId: data.teamId,
          name: data.name, handle: data.handle,
          color: data.color, icon: data.icon,
          status: 'active',
          summary: data.summary || '（暂无简介）',
          progress: 0,
          deadline: data.deadline,
          members: data.members,
          pinnedAgents: data.pinnedAgents,
          threads: 0, files: 0,
          sections: data.sections,
          visibility: data.visibility,
          updates: '刚刚创建',
        };
        projects.value.unshift(p);
        newProjectFor.value = null;
        showToast(`已创建项目「${p.name}」`);
        // navigate into it
        activeTeamId.value = p.teamId;
        activeProjectId.value = p.id;
        view.value = 'project';
      };

      const submitInvite = (data) => {
        if (data.kind === 'email') {
          showToast(`已向 ${data.emails.length} 个邮箱发送邀请`);
        }
      };

      // ───── Governance: content permissions ─────
      const can = (permId, team) => GOV.can(team || activeTeam.value, permId, currentUser.value);
      const myTeamRole = computed(() => GOV.roleKeyOf(activeTeam.value, currentUser.value));
      const togglePolicy = (permId, roleKey) => {
        const team = activeTeam.value;
        if (!team) return;
        if (myTeamRole.value !== 'owner' && myTeamRole.value !== 'admin') return; // only managers edit policy
        GOV.togglePolicy(team, permId, roleKey);
      };
      const resetPolicy = () => {
        const team = activeTeam.value;
        if (!team) return;
        GOV.ALL_PERM_IDS.forEach(pid => { team.policy[pid] = [...(GOV.DEFAULT_POLICY[pid] || [])]; });
        showToast('已恢复默认权限');
      };

      // ───── Generic confirm dialog ─────
      const confirmState = ref(null); // { title, message, detail, confirmText, danger, onConfirm }
      const askConfirm = (cfg) => { confirmState.value = cfg; };
      const runConfirm = () => { const c = confirmState.value; confirmState.value = null; if (c && c.onConfirm) c.onConfirm(); };

      // ───── Knowledge CRUD ─────
      const kbModal = ref(null); // { entry } | null
      const openKbAdd  = () => { kbModal.value = { entry: null }; };
      const openKbEdit = (entry) => { kbModal.value = { entry }; };
      const saveKb = (data) => {
        const team = activeTeam.value; if (!team) return;
        if (!team.knowledge) team.knowledge = [];
        if (data.id) {
          const idx = team.knowledge.findIndex(f => f.name === data.id);
          if (idx >= 0) { const { id, ...rest } = data; team.knowledge[idx] = { ...team.knowledge[idx], ...rest }; }
          showToast('已更新知识条目');
        } else {
          const { id, ...rest } = data;
          team.knowledge.unshift(rest);
          team.stats.knowledge = (team.stats.knowledge || 0) + 1;
          showToast(`已加入「${rest.name}」`);
        }
        kbModal.value = null;
      };
      const deleteKb = (entry) => askConfirm({
        title: '删除知识条目', danger: true, confirmText: '删除',
        message: `确定要删除「${entry.name}」吗？`,
        detail: '团队助手将无法再引用该文件。此操作不可恢复。',
        onConfirm: () => {
          const team = activeTeam.value;
          team.knowledge = team.knowledge.filter(f => f !== entry);
          team.stats.knowledge = Math.max(0, (team.stats.knowledge || 0) - 1);
          showToast('已删除');
        }
      });

      // ───── Shared agents CRUD ─────
      const agentPickerOpen = ref(false);
      const addSharedAgent = (id) => {
        const team = activeTeam.value; if (!team) return;
        if (!team.sharedAgents.includes(id)) {
          team.sharedAgents.push(id);
          team.stats.agents = team.sharedAgents.length;
          showToast('已添加助手');
        }
        agentPickerOpen.value = false;
      };
      const removeSharedAgent = (id) => askConfirm({
        title: '移除共享助手', danger: true, confirmText: '移除',
        message: `确定从团队移除「${agentByIdRaw(id).name}」吗？`,
        detail: '成员将不能再在团队中使用它，已有会话不受影响。',
        onConfirm: () => {
          const team = activeTeam.value;
          team.sharedAgents = team.sharedAgents.filter(x => x !== id);
          team.stats.agents = team.sharedAgents.length;
          showToast('已移除');
        }
      });

      // ───── Members CRUD ─────
      const setMemberRole = (handle, roleLabel) => {
        const team = activeTeam.value; if (!team) return;
        const m = (team.members || []).find(x => x.handle === handle);
        if (m) { m.role = roleLabel; showToast(`已将 ${m.name} 设为${roleLabel}`); }
      };
      const removeMember = (m) => askConfirm({
        title: '移除成员', danger: true, confirmText: '移除',
        message: `确定将 ${m.name} 移出团队吗？`,
        detail: '该成员将失去对团队内容与共享助手的访问。',
        onConfirm: () => {
          const team = activeTeam.value;
          team.members = team.members.filter(x => x !== m);
          team.stats.members = team.members.length;
          showToast('已移除成员');
        }
      });

      // ───── Pinned conversations ─────
      const unpinConvo = (id) => {
        const team = activeTeam.value; if (!team) return;
        team.pinned = (team.pinned || []).filter(c => c.id !== id);
        showToast('已取消置顶');
      };

      // ───── Project edit / delete ─────
      const editProjectFor = ref(null);
      const openEditProject = (p) => { editProjectFor.value = p; };
      const saveProject = (data) => {
        const p = projects.value.find(x => x.id === data.id);
        if (p) Object.assign(p, {
          name: data.name, handle: data.handle, color: data.color, icon: data.icon,
          summary: data.summary || p.summary, deadline: data.deadline,
          members: data.members, pinnedAgents: data.pinnedAgents,
          sections: data.sections, visibility: data.visibility,
        });
        editProjectFor.value = null;
        showToast(`已更新「${data.name}」`);
      };
      const deleteProject = (p) => askConfirm({
        title: '删除项目', danger: true, confirmText: '删除项目',
        message: `确定删除「${p.name}」吗？`,
        detail: '项目下的对话归属将被解除，文件与阶段记录会一并移除。不可恢复。',
        onConfirm: () => {
          projects.value = projects.value.filter(x => x.id !== p.id);
          showToast('已删除项目');
          if (activeProjectId.value === p.id) { activeProjectId.value = null; view.value = 'team'; }
        }
      });
      const archiveProject = (p) => {
        p.status = p.status === 'active' ? 'paused' : 'active';
        showToast(p.status === 'paused' ? `已归档「${p.name}」` : `已重新启用「${p.name}」`);
      };

      const composeSeed = ref(null); // { draft, agentId } | null
      const startTeamCompose = (projectOrNull) => {
        composeSeed.value = null;
        if (projectOrNull && projectOrNull.id) {
          activeTeamId.value = projectOrNull.teamId || activeTeamId.value;
          composeProjectId.value = projectOrNull.id;
        } else {
          composeProjectId.value = null;
        }
        view.value = 'team-compose';
      };
      // AI hand-off: launch a project session pre-seeded with a task / doc prompt
      const startSeededCompose = ({ project, draft, agentId }) => {
        if (project) {
          activeTeamId.value = project.teamId || activeTeamId.value;
          composeProjectId.value = project.id;
        }
        composeSeed.value = { draft: draft || '', agentId: agentId || null };
        view.value = 'team-compose';
      };

      const launchFromCompose = (cfg) => {
        composeSeed.value = null;
        const agent = AGENTS.find(a => a.id === cfg.primaryAgentId) || AGENTS[0];
        const id = 'c' + Date.now();
        const convo = {
          id, title: cfg.text.slice(0, 28) + (cfg.text.length > 28 ? '…' : ''),
          icon: agent.icon, agentId: agent.id, updated: '刚刚',
          teamId: cfg.teamId, projectId: cfg.projectId, visibility: cfg.visibility,
          messages: [{ role: 'user', text: cfg.text }, { role: 'agent', typing: true, text: '' }],
          files: [],
        };
        conversations.value.unshift(convo);
        activeConvoId.value = id;
        activeAgentIds.value = cfg.agentIds && cfg.agentIds.length ? cfg.agentIds : ['hermes'];
        primaryAgentId.value = cfg.primaryAgentId;
        view.value = 'thread';
        workspaceOpen.value = true;
        setTimeout(() => simulateReply(convo), 900);
      };

      const teamProjects = computed(() => projects.value.filter(p => p.teamId === activeTeamId.value));

      // body atmos + density data-attributes
      watch(() => [tweaks.atmos, tweaks.density], () => {
        document.body.setAttribute('data-atmos', tweaks.atmos);
        document.body.setAttribute('data-density', tweaks.density);
        // Changing an inherited custom property on <body> via an attribute selector
        // invalidates but doesn't synchronously recompute never-re-rendered descendants
        // (e.g. the persistent active sidebar/convo rows), which can leave a one-frame
        // stale background. Force a synchronous style+layout flush so the next paint is correct.
        void document.body.offsetHeight;
      }, { immediate: true });

      // keyboard shortcuts
      onMounted(() => {
        const onKey = (e) => {
          const mod = e.metaKey || e.ctrlKey;
          if (mod && e.key === 'k') { e.preventDefault(); showSearch.value = true; }
          if (mod && e.key === 'n') { e.preventDefault(); newChat(); }
          if (mod && e.key === '\\') { e.preventDefault(); tweaks.sideCollapsed = !tweaks.sideCollapsed; }
          if (e.key === 'Escape') { showSearch.value = false; }
        };
        document.addEventListener('keydown', onKey);
        onBeforeUnmount(() => document.removeEventListener('keydown', onKey));
      });

      const newChat = () => {
        view.value = 'landing';
        activeConvoId.value = null;
        draftLanding.value = '';
        primaryAgentId.value = 'hermes';
        activeAgentIds.value = ['hermes'];
      };

      const openConvo = (id) => {
        activeConvoId.value = id;
        view.value = 'thread';
        const c = conversations.value.find(x => x.id === id);
        if (c) {
          primaryAgentId.value = c.agentId;
          if (!activeAgentIds.value.includes(c.agentId)) activeAgentIds.value = ['hermes', c.agentId].filter((v,i,a)=>a.indexOf(v)===i);
        }
        showSearch.value = false;
      };

      const startNewThread = (text, agentId) => {
        const a = AGENTS.find(x => x.id === (agentId || primaryAgentId.value)) || primaryAgent.value;
        const id = 'c' + Date.now();
        const convo = {
          id, title: text.slice(0, 28) + (text.length > 28 ? '…' : ''),
          icon: a.icon, agentId: a.id, updated: '刚刚',
          messages: [{ role: 'user', text }, { role: 'agent', typing: true, text: '' }],
        };
        conversations.value.unshift(convo);
        activeConvoId.value = id;
        view.value = 'thread';
        setTimeout(() => simulateReply(convo), 900);
      };

      const sendFromLanding = () => {
        const text = draftLanding.value.trim();
        if (!text) return;
        startNewThread(text);
        draftLanding.value = '';
      };

      const sendInThread = () => {
        const text = draftThread.value.trim();
        if (!text || !activeConvo.value) return;
        activeConvo.value.messages.push({ role: 'user', text });
        // If multiple agents are active → roundtable, else single reply
        if (activeAgents.value.length >= 2) {
          const stances = ['提出方案', '提出风险', '补充上下文', '直接动手', '反对意见', '另一种切入'];
          const replies = activeAgents.value.map((a, i) => ({
            agentId: a.id,
            stance: stances[i % stances.length],
            typing: true,
            text: '',
          }));
          activeConvo.value.messages.push({ role: 'roundtable', replies, merged: null });
          // simulate each agent typing in sequence
          replies.forEach((r, i) => {
            setTimeout(() => {
              const pool = REPLIES.value;
              r.typing = false;
              r.text = pool[Math.floor(Math.random() * pool.length)];
              // when all done, generate merge
              if (replies.every(x => !x.typing)) {
                setTimeout(() => generateMerge(activeConvo.value), 500);
              }
              nextTick(() => scrollThread());
            }, 700 + i * 900);
          });
        } else {
          activeConvo.value.messages.push({ role: 'agent', typing: true, text: '' });
          setTimeout(() => simulateReply(activeConvo.value), 900);
        }
        activeConvo.value.updated = '刚刚';
        draftThread.value = '';
        nextTick(() => scrollThread());
      };

      const generateMerge = (convo) => {
        if (!convo) return;
        const last = convo.messages[convo.messages.length - 1];
        if (!last || last.role !== 'roundtable' || last.merged) return;
        const names = last.replies.map(r => agentByIdRaw(r.agentId).name).join('、');
        const tones = {
          classical: `综 ${names} 三家之言——共识者三：可即行；分歧者一：宜先验。`,
          warm: `${names} 三位的回答放在一起看——大方向都一致，分歧主要在「先验证还是先动手」。我建议先验证一下风险点，再动手，损失最小。`,
          engineering: `merge(${names}): consensus=[行动方案, 关键风险]; conflict=[执行顺序]; suggest=验证 → 执行.`,
        };
        last.merged = tones[tweaks.voice] || tones.warm;
      };

      const agentByIdRaw = (id) => AGENTS.find(a => a.id === id) || AGENTS[0];



      const REPLIES_BY_VOICE = {
        classical: [
          '已悉。此事我意分三步——一者拆其目标，二者引相关上下文，三者奉上带据之方案。是否即时？',
          '可。先呈一稿试看——若大道无误，再补细节与边界。',
          '已收。涉外二事，待我并察其状，回报结论。',
          '理解。容我先复述其义，若无偏差，便启程。',
        ],
        warm: [
          '我已记下你的要求。接下来按三步走：先拆解目标、再拉相关上下文、最后给你一份带证据的方案。要现在开始吗？',
          '好的。先给你一个能跑的初稿——方向对了我再补细节，省得你跟我对很多遍。',
          '收到。这事涉及到 2 个外部依赖，我并行去摸它们的状态，给你结论。',
          '懂了。让我先复述一下你的目标，确认无误我就开干：',
        ],
        engineering: [
          'ACK. 计划：(1) 解析目标 → (2) 拉取上下文 → (3) 输出方案+证据。是否执行？',
          'OK。先发 v0.1 draft——验证假设后再补细节，避免无效迭代。',
          'Received. 外部依赖 ×2，并行 probe 状态后 return。',
          '复述以确认：',
        ],
      };

      const REPLIES = computed(() => REPLIES_BY_VOICE[tweaks.voice] || REPLIES_BY_VOICE.warm);

      const simulateReply = (convo) => {
        const last = convo.messages[convo.messages.length - 1];
        if (!last || !last.typing) return;
        last.typing = false;
        const pool = REPLIES.value;
        last.text = pool[Math.floor(Math.random() * pool.length)];
        nextTick(() => scrollThread());
      };

      const threadEl = ref(null);
      const scrollThread = () => {
        const el = document.querySelector('.thread');
        if (el) el.scrollTop = el.scrollHeight;
      };

      const pickAgentFromGrid = (a) => {
        primaryAgentId.value = a.id;
        if (!activeAgentIds.value.includes(a.id)) activeAgentIds.value.push(a.id);
      };

      const addAgent = () => {
        // cycle through agents not yet active
        const next = AGENTS.find(a => !activeAgentIds.value.includes(a.id));
        if (next) activeAgentIds.value.push(next.id);
      };

      const updateTweak = (patch) => Object.assign(tweaks, patch);

      const goLandingFromSchedule = () => { view.value = 'landing'; };

      const hello = computed(() => {
        const hour = new Date().getHours();
        const greet = hour < 6 ? '夜深了' : hour < 11 ? '早上好' : hour < 14 ? '中午好' : hour < 18 ? '下午好' : '晚上好';
        if (tweaks.voice === 'classical') {
          return { main: '凡所欲遣，<em>皆可托信使</em>。', sub: 'Quidquid mittere vis, mihi crede.' };
        }
        if (tweaks.voice === 'engineering') {
          return { main: `> <em>hermes</em> ready —`, sub: `agents: ${activeAgents.value.length} · model: ${model.value.name} · uptime: 99.9%` };
        }
        return { main: `${greet}，<em>今天有什么安排？</em>`, sub: 'Ask me anything · 我会调度合适的助手为你完成。' };
      });

      return {
        view, conversations, teams, projects, activeConvoId, activeConvo,
        activeTeamId, activeTeam, activeProjectId, activeProject, composeProjectId, composeProject,
        teamProjects, workspaceOpen,
        draftLanding, draftThread,
        showSearch, primaryAgentId, primaryAgent, activeAgents, allAgents, agentTab, filteredAgents,
        model, models: MODELS, suggestions: SUGGESTIONS, tweaks, tweaksOpen, hello,
        currentUser, adminTab, openAdmin,
        authed, loginMethod, onLogin, doLogout, openProfile,
        openHistory, deleteConvo, deleteConvos, togglePinConvo, renameConvo,
        newTeamOpen, createTeam,
        onAttach, openProjectWork,
        newChat, openConvo, openTeam, openProject, startTeamCompose, launchFromCompose,
        sendFromLanding, sendInThread, pickAgentFromGrid, addAgent,
        updateTweak, goLandingFromSchedule, threadEl, AGENTS,
        sealFor, profiles: PROFILES, activeProfile, pickProfile, acpSessionId, modelOf,
        newProjectFor, inviteFor, toast, openNewProject, openInvite, createProject, submitInvite,
        // governance + CRUD
        can, myTeamRole, togglePolicy, resetPolicy, GOV,
        confirmState, askConfirm, runConfirm,
        kbModal, openKbAdd, openKbEdit, saveKb, deleteKb,
        agentPickerOpen, addSharedAgent, removeSharedAgent,
        setMemberRole, removeMember, unpinConvo,
        editProjectFor, openEditProject, saveProject, deleteProject, archiveProject,
        startSeededCompose, composeSeed,
        cycleAtmos: () => {
          const order = ['letter', 'cinnabar', 'celadon', 'night', 'ink'];
          const i = order.indexOf(tweaks.atmos);
          tweaks.atmos = order[(i + 1) % order.length];
        },
        agentById: (id) => AGENTS.find(a => a.id === id) || AGENTS[0],
      };
    },
    template: `
      <login-page v-if="!authed" @login="onLogin" />
      <div v-else class="app" :class="{'side-collapsed': tweaks.sideCollapsed}">
        <sidebar
          :view="view"
          :active-convo-id="activeConvoId"
          :conversations="conversations"
          :teams="teams"
          :active-team-id="activeTeamId"
          :current-user="currentUser"
          @new-chat="newChat"
          @open-convo="openConvo"
          @open-team="openTeam"
          @open-admin="() => openAdmin()"
          @open-search="showSearch = true"
          @open-history="openHistory"
          @nav="(v) => view = v"
          @open-settings="tweaksOpen = true"
          @open-profile="openProfile"
          @logout="doLogout"
          @add-team="newTeamOpen = true"
        />

        <div class="main">
          <!-- top bar -->
          <div class="topbar">
            <button class="icon-btn" @click="tweaks.sideCollapsed = !tweaks.sideCollapsed" title="切换侧栏 ⌘\\">
              <icon name="sidebar" />
            </button>
            <button class="icon-btn" disabled><icon name="back" /></button>
            <button class="icon-btn" disabled><icon name="forward" /></button>
            <span class="topbar-spacer"></span>
            <span class="top-pill"><span class="dot"></span> ACP · {{ activeProfile.name }} · <span style="font-family:var(--font-mono);font-size:11px;opacity:0.7;">{{ acpSessionId }}</span></span>
            <button class="icon-btn" @click="cycleAtmos" title="切换氣質">
              <icon :name="(tweaks.atmos === 'night' || tweaks.atmos === 'ink') ? 'sun' : 'moon'" />
            </button>
            <button class="icon-btn" @click="tweaksOpen = !tweaksOpen" title="调整">
              <icon name="settings" />
            </button>
          </div>

          <!-- Landing -->
          <div v-if="view === 'landing'" class="stage">
            <div class="landing">
              <div class="landing-inner">
                <h1 class="hello" v-html="hello.main"></h1>
                <div class="hello-sub">{{ hello.sub }}</div>

                <agent-switcher
                  :active-agents="activeAgents"
                  :all-agents="allAgents"
                  :primary="primaryAgentId"
                  @set-primary="(id) => primaryAgentId = id"
                  @add-agent="addAgent"
                />

                <composer
                  :value="draftLanding"
                  :placeholder="primaryAgent.name + '，发消息、上传文件、打开文件夹或创建定时任务…'"
                  :profile="activeProfile"
                  :profiles="profiles"
                  :model-of="modelOf"
                  autofocus
                  @update:value="(v) => draftLanding = v"
                  @send="sendFromLanding"
                  @pick-profile="pickProfile"
                  @attach="onAttach"
                  @open-project="openProjectWork"
                />

                <agents-grid
                  :agents="filteredAgents"
                  :tab="agentTab"
                  @pick="pickAgentFromGrid"
                  @tab="(t) => agentTab = t"
                />
              </div>
            </div>

            <div class="floaters">
              <button class="float-btn" title="对话"><icon name="chat" /></button>
              <button class="float-btn" title="收藏"><icon name="star" /></button>
              <button class="float-btn" title="联网"><icon name="globe" /></button>
            </div>
          </div>

          <!-- Thread -->
          <div v-else-if="view === 'thread' && activeConvo" class="thread-split" :class="{'ws-closed': !workspaceOpen || !activeConvo.files || !activeConvo.files.length}">
            <div class="thread">
              <div class="thread-inner">
                <div class="thread-head" style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px;">
                  <div style="flex:1; min-width:0;">
                    <div class="thread-title-row">
                      <convo-seal :seed="activeConvo.id" :size="40" />
                      <div style="min-width:0;">
                        <h2 class="thread-title">{{ activeConvo.title }}</h2>
                        <div class="thread-meta" style="margin-top:6px;">
                          <span class="agent-tag">
                            <icon :name="agentById(activeConvo.agentId).icon" />
                            {{ agentById(activeConvo.agentId).name }}
                          </span>
                          <span v-if="activeAgents.length > 1" class="agent-tag" :style="{ background: 'rgba(184,133,42,0.14)', color: 'var(--accent-deep)' }">
                            <icon name="sparkle" /> 圆桌 · {{ activeAgents.length }} 人
                          </span>
                          <span v-if="activeConvo.projectId" class="agent-tag" :style="{ background: 'rgba(58,109,161,0.12)', color: '#3a6da1' }">
                            <icon name="folder" /> {{ (projects.find(p => p.id === activeConvo.projectId) || {}).name }}
                          </span>
                          <span v-else-if="activeConvo.teamId" class="agent-tag" :style="{ background: 'rgba(74,122,58,0.12)', color: 'var(--ok)' }">
                            <icon name="user" /> {{ (teams.find(t => t.id === activeConvo.teamId) || {}).name }} 团队
                          </span>
                          <span>·</span>
                          <span style="font-family:var(--font-mono);font-size:11px;">ACP {{ acpSessionId }}</span>
                          <span>·</span>
                          <span>{{ activeConvo.updated }}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="thread-actions">
                    <button v-if="activeConvo.files && activeConvo.files.length"
                            class="thread-action" :class="{on: workspaceOpen}" @click="workspaceOpen = !workspaceOpen">
                      <icon name="folder" />
                      工作区 · {{ activeConvo.files.length }}
                    </button>
                  </div>
                </div>
                <hermes-message v-for="(m, i) in activeConvo.messages" :key="i" :msg="m" :agent="agentById(activeConvo.agentId)" :agent-lookup="agentById" />
              </div>

              <div class="dock">
                <composer
                  :value="draftThread"
                  :placeholder="activeAgents.length > 1 ? ('与 ' + activeAgents.length + ' 位助手圆桌对话…') : ('继续与 ' + agentById(activeConvo.agentId).name + ' 对话…')"
                  :profile="activeProfile"
                  :profiles="profiles"
                  :model-of="modelOf"
                  dense
                  @update:value="(v) => draftThread = v"
                  @send="sendInThread"
                  @pick-profile="pickProfile"
                  @attach="onAttach"
                  @open-project="openProjectWork"
                />
              </div>
            </div>

            <workspace v-if="activeConvo.files && activeConvo.files.length"
                       :files="activeConvo.files"
                       :open="workspaceOpen"
                       @close="workspaceOpen = false" />
          </div>

          <!-- Team -->
          <team-page v-else-if="view === 'team' && activeTeam"
                     :team="activeTeam"
                     :projects="teamProjects"
                     :current-user="currentUser"
                     :can="can"
                     :my-role="myTeamRole"
                     :gov="GOV"
                     @open-convo="openConvo"
                     @open-project="openProject"
                     @new-project="openNewProject"
                     @edit-project="openEditProject"
                     @delete-project="deleteProject"
                     @archive-project="archiveProject"
                     @start-conv="startTeamCompose"
                     @pick-agent="(a) => { pickAgentFromGrid(a); primaryAgentId = a.id; view = 'landing'; }"
                     @invite="openInvite"
                     @kb-add="openKbAdd"
                     @kb-edit="openKbEdit"
                     @kb-delete="deleteKb"
                     @agent-add="agentPickerOpen = true"
                     @agent-remove="removeSharedAgent"
                     @member-role="({handle, role}) => setMemberRole(handle, role)"
                     @member-remove="removeMember"
                     @unpin="unpinConvo"
                     @toggle-policy="({permId, roleKey}) => togglePolicy(permId, roleKey)"
                     @reset-policy="resetPolicy" />

          <!-- Project detail -->
          <project-page v-else-if="view === 'project' && activeProject && activeTeam"
                        :project="activeProject"
                        :team="activeTeam"
                        :conversations="conversations"
                        :current-user="currentUser"
                        :can="can"
                        @back="() => view = 'team'"
                        @open-convo="openConvo"
                        @start-conv="startTeamCompose"
                        @edit-project="openEditProject"
                        @delete-project="deleteProject"
                        @archive-project="archiveProject"
                        @ask-confirm="askConfirm"
                        @ai-handoff="startSeededCompose"
                        @pick-agent="(a) => { pickAgentFromGrid(a); primaryAgentId = a.id; view = 'landing'; }" />

          <!-- Team compose -->
          <team-compose v-else-if="view === 'team-compose' && activeTeam"
                        :team="activeTeam"
                        :project="composeProject"
                        :projects="projects"
                        :model="model"
                        :seed="composeSeed"
                        @back="() => view = composeProject ? 'project' : 'team'"
                        @launch="launchFromCompose" />

          <!-- Admin -->
          <admin-page v-else-if="view === 'admin'" :initial-tab="adminTab" />

          <!-- User profile / account settings -->
          <user-profile-page v-else-if="view === 'profile'"
                             :user="currentUser"
                             :teams="teams"
                             @back="() => view = 'landing'"
                             @logout="doLogout"
                             @open-admin="() => openAdmin()"
                             @toast="(t) => showToast(t)" />

          <!-- Conversation history / management -->
          <history-page v-else-if="view === 'history'"
                       :conversations="conversations"
                       :agent-lookup="agentById"
                       :teams="teams"
                       :projects="projects"
                       @open-convo="openConvo"
                       @new-chat="newChat"
                       @delete="deleteConvo"
                       @delete-many="deleteConvos"
                       @toggle-pin="togglePinConvo"
                       @rename="renameConvo" />

          <!-- Schedule (simple placeholder view) -->
          <div v-else-if="view === 'schedule'" class="stage">
            <div class="landing" style="padding-top:80px;">
              <div class="landing-inner">
                <h1 class="hello" style="font-size:34px;"><em>定时任务</em></h1>
                <div class="hello-sub">让信使在指定时刻替你跑腿。</div>
                <div style="width:100%;max-width:640px;margin-top:24px;display:flex;flex-direction:column;gap:8px;">
                  <div v-for="(t, i) in [
                    { name: '每周五 17:00 — 生成周报草稿', agent: 'cowork', next: '本周五 17:00' },
                    { name: '每天 09:30 — 拉取昨日关键指标', agent: 'analyst', next: '明早 09:30' },
                    { name: '每月 1 号 — 整理上月发票', agent: 'word', next: '12月1日 10:00' },
                  ]" :key="i"
                    style="background:var(--bg-panel);border:1px solid var(--rule);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;">
                    <div class="agent-icon" :style="{ background: agentById(t.agent).color, width:'28px',height:'28px',borderRadius:'7px'}">
                      <icon :name="agentById(t.agent).icon" />
                    </div>
                    <div style="flex:1;min-width:0;">
                      <div style="font-weight:600;color:var(--ink);">{{ t.name }}</div>
                      <div style="font-size:11.5px;color:var(--ink-mute);margin-top:2px;">由 {{ agentById(t.agent).name }} 执行 · 下次：{{ t.next }}</div>
                    </div>
                    <button class="icon-btn"><icon name="settings" /></button>
                  </div>
                  <button @click="goLandingFromSchedule" style="margin-top:8px;align-self:flex-start;color:var(--ink-mute);font-size:12px;display:inline-flex;align-items:center;gap:4px;">
                    <icon name="back" style="width:12px;height:12px;" /> 返回
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <search-palette
          v-if="showSearch"
          :conversations="conversations"
          :agents="allAgents"
          @close="showSearch = false"
          @open-convo="openConvo"
          @pick-agent="(a) => { pickAgentFromGrid(a); showSearch = false; newChat(); primaryAgentId = a.id; }"
        />

        <tweaks-panel :open="tweaksOpen" :tweaks="tweaks" @close="tweaksOpen = false" @update="updateTweak" />

        <new-project-modal v-if="newProjectFor"
                           :team="newProjectFor"
                           @close="newProjectFor = null"
                           @create="createProject" />
        <new-project-modal v-if="editProjectFor"
                           :team="activeTeam"
                           :project="editProjectFor"
                           @close="editProjectFor = null"
                           @save="saveProject" />

        <invite-members-modal v-if="inviteFor"
                              :team="inviteFor"
                              @close="inviteFor = null"
                              @invite="submitInvite" />

        <knowledge-modal v-if="kbModal"
                         :entry="kbModal.entry"
                         :current-user="currentUser"
                         @close="kbModal = null"
                         @save="saveKb" />

        <agent-picker-modal v-if="agentPickerOpen && activeTeam"
                            :team="activeTeam"
                            @close="agentPickerOpen = false"
                            @add="addSharedAgent" />

        <new-team-modal v-if="newTeamOpen"
                        :current-user="currentUser"
                        @close="newTeamOpen = false"
                        @create="createTeam" />

        <confirm-modal v-if="confirmState"
                       :title="confirmState.title"
                       :message="confirmState.message"
                       :detail="confirmState.detail"
                       :confirm-text="confirmState.confirmText"
                       :danger="confirmState.danger"
                       @close="confirmState = null"
                       @confirm="runConfirm" />

        <div v-if="toast" class="hm-toast" :class="toast.kind">
          <icon name="check" />
          {{ toast.text }}
        </div>
      </div>
    `
  };

  createApp(App).mount('#app');
})();

</script>
</body>
</html>
