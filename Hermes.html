<script>
// Hermes — "Start a session in a team/project" composer page
window.HERMES_COMPOSE = (() => {
  const { ref, computed, watch } = Vue;
  const Icon = window.HERMES_ICONS.Icon;
  const { AGENTS } = window.HERMES_DATA;
  const agentById = (id) => AGENTS.find(a => a.id === id) || AGENTS[0];

  const TeamCompose = {
    name: 'TeamCompose',
    components: { Icon },
    props: { team: Object, project: Object, projects: Array, model: Object, seed: { type: Object, default: null } },
    emits: ['back', 'launch'],
    setup(props) {
      const projectId = ref(props.project ? props.project.id : null);
      const picked = ref(['hermes']);
      // initial picked agents based on project / team
      const baseAgents = computed(() => {
        if (projectId.value) {
          const p = (props.projects || []).find(x => x.id === projectId.value);
          if (p) return p.pinnedAgents;
        }
        return props.team.sharedAgents;
      });
      // when project changes, seed picks with its pinned agents
      watch(projectId, () => {
        const proj = (props.projects || []).find(p => p.id === projectId.value);
        if (proj) picked.value = ['hermes', ...proj.pinnedAgents].filter((v,i,a) => a.indexOf(v) === i);
        else picked.value = ['hermes'];
      });

      const knowledge = ref({ team: true, project: true, web: false });
      const draft = ref('');
      const visibility = ref('team');

      // Pre-seed from an AI hand-off (project task / doc)
      if (props.seed) {
        if (props.seed.draft) draft.value = props.seed.draft;
        if (props.seed.agentId && props.seed.agentId !== 'hermes' && !picked.value.includes(props.seed.agentId)) {
          picked.value.push(props.seed.agentId);
        }
      }

      const togglePick = (id) => {
        if (id === 'hermes') return; // always on
        const idx = picked.value.indexOf(id);
        if (idx >= 0) picked.value.splice(idx, 1);
        else picked.value.push(id);
      };

      const availableAgents = computed(() => {
        // show team's shared agents, with picked-state
        return (props.team.sharedAgents || []).map(id => agentById(id));
      });

      const teamProjects = computed(() => (props.projects || []).filter(p => p.teamId === props.team.id));

      return { projectId, picked, baseAgents, knowledge, draft, visibility, togglePick, availableAgents, teamProjects, agentById };
    },
    template: `
      <div class="compose-stage">
        <div class="compose-inner">
          <button class="compose-back" @click="$emit('back')"><icon name="back" :size="12" /> 返回 {{ project ? project.name : team.name }}</button>

          <div class="compose-head">
            <h1 class="compose-title">在 <em>{{ team.name }}</em> 中开启会话</h1>
            <div class="compose-sub">配置上下文、选择助手，再写下你要做的事——信使会立即上路。</div>
          </div>

          <!-- Project -->
          <div class="compose-field">
            <div class="compose-label">
              项目 <span class="hint">把会话归到某个项目，所有产出会进入该项目</span>
            </div>
            <div class="ctx-chip-row">
              <button class="ctx-chip" :class="{on: projectId === null}" @click="projectId = null">
                <icon name="folder" /> 无项目
                <icon v-if="projectId === null" name="check" class="check" />
              </button>
              <button v-for="p in teamProjects" :key="p.id"
                      class="ctx-chip" :class="{on: projectId === p.id}"
                      @click="projectId = p.id">
                <span class="proj-status" :class="p.status" style="padding:0;margin:0;background:none;">
                  <span class="dot" :style="{ background: p.color }"></span>
                </span>
                {{ p.name }}
                <icon v-if="projectId === p.id" name="check" class="check" />
              </button>
            </div>
          </div>

          <!-- Agents -->
          <div class="compose-field">
            <div class="compose-label">
              助手 <span class="hint">Hermes 总是在线，作为调度者</span>
            </div>
            <div class="agent-pick-grid">
              <button v-for="a in availableAgents" :key="a.id"
                      class="agent-pick"
                      :class="{on: picked.includes(a.id)}"
                      @click="togglePick(a.id)">
                <div class="agent-icon" :style="{ background: a.color }"><icon :name="a.icon" /></div>
                <div style="min-width:0;flex:1;">
                  <div class="nm">{{ a.name }}<span v-if="a.id === 'hermes'" class="official" style="font-size:9px;color:var(--accent-deep);background:var(--accent-tint);padding:1px 5px;border-radius:4px;">主</span></div>
                  <div class="ds">{{ a.desc }}</div>
                </div>
                <div class="pick-mark"><icon v-if="picked.includes(a.id)" name="check" :size="9" /></div>
              </button>
            </div>
          </div>

          <!-- Knowledge / context -->
          <div class="compose-field">
            <div class="compose-label">
              上下文 <span class="hint">允许助手在回答时引用</span>
            </div>
            <div class="ctx-chip-row">
              <button class="ctx-chip" :class="{on: knowledge.team}" @click="knowledge.team = !knowledge.team">
                <icon name="doc" /> 团队知识库
                <icon v-if="knowledge.team" name="check" class="check" />
              </button>
              <button class="ctx-chip" :class="{on: knowledge.project}" @click="knowledge.project = !knowledge.project" :disabled="!projectId" :style="{opacity: projectId ? 1 : 0.5}">
                <icon name="folder" /> 项目文件
                <icon v-if="knowledge.project && projectId" name="check" class="check" />
              </button>
              <button class="ctx-chip" :class="{on: knowledge.web}" @click="knowledge.web = !knowledge.web">
                <icon name="globe" /> 联网搜索
                <icon v-if="knowledge.web" name="check" class="check" />
              </button>
            </div>
          </div>

          <!-- Visibility -->
          <div class="compose-field">
            <div class="compose-label">可见性</div>
            <div class="ctx-chip-row">
              <button class="ctx-chip" :class="{on: visibility === 'team'}" @click="visibility = 'team'">
                <icon name="user" /> 团队可见
                <icon v-if="visibility === 'team'" name="check" class="check" />
              </button>
              <button class="ctx-chip" :class="{on: visibility === 'private'}" @click="visibility = 'private'">
                <icon name="pin" /> 仅我可见
                <icon v-if="visibility === 'private'" name="check" class="check" />
              </button>
            </div>
          </div>

          <!-- Prompt -->
          <div class="compose-field">
            <div class="compose-label">
              开场提示
              <span class="hint">Enter 发送 · Shift+Enter 换行</span>
            </div>
            <div class="composer" style="border-radius:14px;">
              <textarea v-model="draft" class="composer-input"
                placeholder="说说你想做的事——比如「帮我把上周的设计评审纪要整理成发给全公司的简报」"
                style="min-height:120px;"
                @keydown.enter.exact.prevent="launch"></textarea>
              <div class="composer-toolbar">
                <button class="composer-tool"><icon name="paperclip" /> 附件</button>
                <button class="composer-tool"><icon name="sparkle" /> 深思</button>
                <span class="composer-spacer"></span>
                <span class="model-pick" style="cursor:default;"><icon name="target" /> {{ model.name }}</span>
                <button class="send-btn" :class="{armed: draft.trim(), disabled: !draft.trim()}" @click="launch"><icon name="arrow_up" /></button>
              </div>
            </div>
          </div>

          <div style="font-size:11.5px;color:var(--ink-mute);font-style:italic;font-family:var(--font-serif);">
            会话将被记录到 {{ teamProjects.find(p => p.id === projectId)?.name || (visibility === 'team' ? team.name + ' 团队' : '我的私人空间') }}。
          </div>
        </div>
      </div>
    `,
    methods: {
      launch() {
        const text = this.draft.trim();
        if (!text) return;
        this.$emit('launch', {
          text,
          agentIds: this.picked,
          primaryAgentId: this.picked[this.picked.length - 1] || 'hermes',
          projectId: this.projectId,
          teamId: this.team.id,
          visibility: this.visibility,
          knowledge: { ...this.knowledge },
        });
      }
    }
  };

  return { TeamCompose };
})();

</script>

<script>
// Hermes — Workspace pane (file tree + preview)
// Shows AI-produced artifacts alongside a conversation.
window.HERMES_WORKSPACE = (() => {
  const { ref, computed, watch } = Vue;
  const Icon = window.HERMES_ICONS.Icon;

  const Workspace = {
    name: 'Workspace',
    components: { Icon },
    props: { files: Array, open: Boolean },
    emits: ['close'],
    setup(props) {
      const activeId = ref(null);
      watch(() => props.files, (files) => {
        if (!files || !files.length) { activeId.value = null; return; }
        if (!activeId.value || !files.find(f => f.id === activeId.value)) {
          const act = files.find(f => f.active) || files[0];
          activeId.value = act.id;
        }
      }, { immediate: true });
      const active = computed(() => (props.files || []).find(f => f.id === activeId.value));
      return { activeId, active };
    },
    template: `
      <aside class="workspace">
        <div class="ws-head">
          <div class="ws-title"><icon name="folder" /> 工作区
            <span class="ws-count">{{ files.length }} 份产出</span>
          </div>
          <div class="ws-actions">
            <button class="icon-btn" title="新建"><icon name="plus" /></button>
            <button class="icon-btn" title="分享"><icon name="share" /></button>
            <button class="icon-btn" @click="$emit('close')" title="关闭"><icon name="close" /></button>
          </div>
        </div>

        <div v-if="active" class="ws-meta-row">
          <span class="nm-bold">{{ active.name }}</span>
          <span class="ver-pill">v{{ active.versions }}</span>
          <span>{{ active.size }} · 更新于 {{ active.updated }}</span>
          <span style="margin-left:auto;display:flex;gap:2px;">
            <button class="icon-btn" title="复制"><icon name="copy" /></button>
            <button class="icon-btn" title="下载"><icon name="folder" /></button>
            <button class="icon-btn" title="历史"><icon name="clock" /></button>
          </span>
        </div>

        <div class="ws-body">
          <div class="ws-tree">
            <div v-for="f in files" :key="f.id"
                 class="ws-file" :class="{active: f.id === activeId}"
                 @click="activeId = f.id">
              <div class="kind">{{ f.kind }}</div>
              <div class="nm">{{ f.name }}</div>
              <div class="ver">v{{ f.versions }}</div>
            </div>
            <div v-if="!files.length" style="padding:20px 10px;font-size:11px;color:var(--ink-mute);text-align:center;">
              助手还没有生成文件
            </div>
          </div>

          <div class="ws-preview">
            <div v-if="!active" class="ws-empty">选一个文件预览</div>
            <docx-render v-else-if="active.preview.type === 'docx'" :data="active.preview" />
            <md-render   v-else-if="active.preview.type === 'md'"   :body="active.preview.body" />
            <table-render v-else-if="active.preview.type === 'table'" :data="active.preview" />
            <code-render v-else-if="active.preview.type === 'code'" :data="active.preview" />
            <div v-else class="ws-empty">不支持的预览类型</div>
          </div>
        </div>
      </aside>
    `
  };

  // ─── DOCX paper preview ───
  const DocxRender = {
    name: 'DocxRender',
    props: ['data'],
    template: `
      <div class="docx-paper">
        <h1 class="docx-title">{{ data.title }}</h1>
        <div class="docx-subtitle">{{ data.subtitle }}</div>
        <div v-for="s in data.sections" :key="s.label" class="docx-section">
          <div class="docx-section-label">{{ s.label }}</div>
          <div v-for="f in s.fields" :key="f" class="docx-field">
            <span class="lbl">{{ f }}</span>
            <span class="val">______________________</span>
          </div>
        </div>
        <div class="docx-confirm">
          <span class="docx-check"></span>
          <span>{{ data.confirm }}</span>
        </div>
      </div>
    `
  };

  // ─── Markdown (very minimal, line-based) ───
  const MdRender = {
    name: 'MdRender',
    props: ['body'],
    computed: {
      blocks() {
        const lines = (this.body || '').split('\n');
        const out = [];
        let listBuf = null;
        const flushList = () => { if (listBuf) { out.push({ type: 'ul', items: listBuf }); listBuf = null; } };
        for (const l of lines) {
          if (/^#\s+/.test(l))       { flushList(); out.push({ type: 'h1', text: l.replace(/^#\s+/, '') }); }
          else if (/^##\s+/.test(l)) { flushList(); out.push({ type: 'h2', text: l.replace(/^##\s+/, '') }); }
          else if (/^>\s+/.test(l))  { flushList(); out.push({ type: 'q',  text: l.replace(/^>\s+/, '') }); }
          else if (/^-\s+\[\s\]\s+/.test(l)) { listBuf = listBuf || []; listBuf.push({ todo: true, text: l.replace(/^-\s+\[\s\]\s+/, '') }); }
          else if (/^-\s+/.test(l))  { listBuf = listBuf || []; listBuf.push({ todo: false, text: l.replace(/^-\s+/, '') }); }
          else if (l.trim() === '')  { flushList(); }
          else                       { flushList(); out.push({ type: 'p', text: l }); }
        }
        flushList();
        return out;
      }
    },
    template: `
      <div class="md-preview">
        <template v-for="(b, i) in blocks" :key="i">
          <h1 v-if="b.type === 'h1'">{{ b.text }}</h1>
          <h2 v-else-if="b.type === 'h2'">{{ b.text }}</h2>
          <blockquote v-else-if="b.type === 'q'">{{ b.text }}</blockquote>
          <p v-else-if="b.type === 'p'">{{ b.text }}</p>
          <ul v-else-if="b.type === 'ul'">
            <li v-for="(it, j) in b.items" :key="j" :class="{todo: it.todo}">{{ it.text }}</li>
          </ul>
        </template>
      </div>
    `
  };

  // ─── Table ───
  const TableRender = {
    name: 'TableRender',
    props: ['data'],
    template: `
      <div class="tbl-preview">
        <table>
          <thead><tr><th v-for="h in data.headers" :key="h">{{ h }}</th></tr></thead>
          <tbody>
            <tr v-for="(r, i) in data.rows" :key="i">
              <td v-for="(c, j) in r" :key="j">{{ c }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    `
  };

  // ─── Code w/ tiny json highlighter ───
  const CodeRender = {
    name: 'CodeRender',
    props: ['data'],
    computed: {
      lines() {
        const body = this.data.body || '';
        return body.split('\n').map((line, i) => ({ n: i + 1, html: this.hilite(line) }));
      }
    },
    methods: {
      esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); },
      hilite(line) {
        if (this.data.lang !== 'json') return this.esc(line);
        let s = this.esc(line);
        s = s.replace(/("(?:\\.|[^"\\])*")(\s*:)/g, '<span class="kw">$1</span>$2'); // keys
        s = s.replace(/:\s*("(?:\\.|[^"\\])*")/g, m => m.replace(/("(?:\\.|[^"\\])*")/g, '<span class="str">$1</span>'));
        s = s.replace(/(\b\d+\b)/g, '<span class="num">$1</span>');
        s = s.replace(/([\{\}\[\],])/g, '<span class="punct">$1</span>');
        return s;
      }
    },
    template: `
      <pre class="code-preview"><template v-for="l in lines" :key="l.n"><span class="ln">{{ l.n }}</span><span v-html="l.html"></span>
</template></pre>
    `
  };

  Workspace.components = { Icon, DocxRender, MdRender, TableRender, CodeRender };

  return { Workspace };
})();

</script>

            </div>

        </div>

        <div style="font-family:var(--font-serif);font-size:16px;font-weight:600;color:var(--ink);margin-bottom:10px;">权限矩阵</div>
        <div class="perm-table">
          <div class="perm-grid">
            <div class="cell head">权限</div>
            <div v-for="r in roles" :key="r.id" class="cell head center">{{ r.name }}</div>

            <template v-for="g in permissions" :key="g.group">

              <template v-for="p in g.items" :key="p.id">
                <div class="cell">

                <div v-for="r in roles" :key="r.id" class="cell center">
                  <div v-if="p.roles.includes(r.id)" class="perm-check"><icon name="check" /></div>
                  <div v-else class="perm-blank"></div>
                </div>
              </template>
            </template>
          </div>
        </div>
      </div>
    `
  };

  return { AdminOverview, AdminUsers, AdminPermissions };
})();

</script>

<script>
// Hermes — Admin: Identity providers (LDAP/AD + WeCom SSO) + Audit + Shell
window.HERMES_ADMIN_IDENTITY = (() => {
  const { ref, computed, reactive, watch } = Vue;
  const Icon = window.HERMES_ICONS.Icon;
  const { TEAMS } = window.HERMES_DATA;

  // ─── Identity Providers (LDAP / WeCom / SAML / OIDC / Feishu) ───
  const AdminIdentity = {
    name: 'AdminIdentity',
    components: { Icon },
    props: { providers: Object },
    setup(props) {
      const order = ['ldap', 'wecom', 'saml', 'oidc', 'feishu'];
      const activeId = ref('ldap');
      const local = reactive(JSON.parse(JSON.stringify(props.providers)));
      const testState = ref(null); // null | 'testing' | 'ok' | 'fail'
      const active = computed(() => local[activeId.value]);
      const testConn = () => {
        testState.value = 'testing';
        setTimeout(() => {
          testState.value = activeId.value === 'saml' || activeId.value === 'oidc' || activeId.value === 'feishu' ? 'fail' : 'ok';
        }, 1200);
      };
      watch(activeId, () => { testState.value = null; });

      // ─ dept → team mapping helpers (used by LDAP + WeCom) ─
      const teamOpts = [{ id: null, name: '不自动加入' }, ...TEAMS.map(t => ({ id: t.id, name: t.name }))];
      const teamName = (id) => (TEAMS.find(t => t.id === id) || {}).name || id;
      const cycleTeam = (m) => {
        const idx = teamOpts.findIndex(o => o.id === (m.autoTeam || null));
        m.autoTeam = teamOpts[(idx + 1) % teamOpts.length].id;
      };
      const cycleRole = (m) => { m.role = m.role === 'member' ? 'viewer' : (m.role === 'viewer' ? 'team_admin' : 'member'); };
      const roleLabel = (r) => ({ member: '成员', viewer: '只读', team_admin: '团队管理员' }[r] || '成员');
      const addMapping = () => {
        const cfg = active.value.config;
        if (!cfg.deptMapping) cfg.deptMapping = [];
        cfg.deptMapping.push({ ldap: '', hermes: '', autoTeam: null, role: 'member' });
      };
      const removeMapping = (i) => { active.value.config.deptMapping.splice(i, 1); };

      return { order, activeId, active, local, testState, testConn,
        teamOpts, teamName, cycleTeam, cycleRole, roleLabel, addMapping, removeMapping };
    },
    template: `
      <div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;">
          <div>
            <div style="font-family:var(--font-serif);font-size:22px;font-weight:600;color:var(--ink);">身份与连接器</div>
            <div style="font-size:12.5px;color:var(--ink-mute);margin-top:2px;">集中管理 LDAP / AD 域、企业微信 SSO 及其他身份源。用户身份信息会按映射规则同步进 Hermes。</div>
          </div>
          <button class="btn"><icon name="plus" /> 添加连接器</button>
        </div>

        <div class="ip-grid">
          <button v-for="id in order" :key="id" class="ip-card"
                  :class="{active: activeId === id, disabled: !local[id].enabled}"
                  @click="activeId = id">
            <div class="ip-card-head">
              <div class="ip-logo" :style="{ background: color(id) }">
                <icon v-if="iconOf(id)" :name="iconOf(id)" />
                <template v-else>{{ letterOf(id) }}</template>
              </div>
              <div style="flex:1;min-width:0;">
                <div class="ip-name">{{ local[id].name }}</div>
                <div class="ip-meta">最近同步 · {{ local[id].lastSync }}</div>
              </div>
              <span class="ip-status" :class="{ off: !local[id].enabled }">
                <span class="dot"></span>{{ local[id].enabled ? '已启用' : '未启用' }}
              </span>
            </div>
            <div class="ip-stats" v-if="local[id].enabled">
              <div class="ip-stat">
                <div class="ip-stat-v">{{ local[id].synced }}</div>
                <div class="ip-stat-l">已同步</div>

  const AdminAudit = {
    name: 'AdminAudit',
    components: { Icon },
    props: { audit: Array },
    setup(props) {
      const q = ref('');
      const resultFilter = ref('all');
      const filtered = computed(() => {
        const term = q.value.trim().toLowerCase();
        return props.audit.filter(a => {
          if (resultFilter.value !== 'all' && a.result !== resultFilter.value) return false;
          if (!term) return true;
          return [a.actor, a.action, a.target, a.ip, a.meta].some(v => (v || '').toLowerCase().includes(term));
        });
      });
      return { q, resultFilter, filtered };

                  @click="resultFilter = nextOf(['all','ok','fail','partial'], resultFilter)">

            <icon name="chevron_down" />
          </button>
          <span style="flex:1;"></span>
          <span style="font-size:12px;color:var(--ink-mute);">{{ filtered.length }} 条</span>
        </div>

        <div class="audit-table">
          <div class="au-row head">
            <div>时间戳</div>
            <div>操作者</div>
            <div>动作</div>
            <div class="col-target">目标</div>
            <div>结果</div>
            <div class="col-ip">IP</div>
          </div>
          <div v-for="(a, i) in filtered" :key="i" class="au-row">
            <div class="au-ts">{{ a.ts }}</div>
            <div class="au-actor">{{ a.actor }}</div>
            <div>{{ a.action }}</div>
            <div class="col-target">
              <div class="au-target">{{ a.target }}</div>
              <div class="au-meta">{{ a.meta }}</div>
            </div>
            <div><span class="au-result" :class="a.result">{{ a.result }}</span></div>
            <div class="col-ip au-ip">{{ a.ip }}</div>
          </div>
        </div>
      </div>
    `,
    methods: {
      nextOf(arr, cur) { const i = arr.indexOf(cur); return arr[(i + 1) % arr.length]; }
    }
  };

  return { AdminIdentity, AdminAudit };
})();

</script>

    components: { Icon, AdminOverview, AdminUsers, AdminPermissions, AdminIdentity, AdminAudit, SystemSettings },
    props: { initialTab: { type: String, default: 'overview' } },
    setup(props) {
      const tab = ref(props.initialTab || 'overview');
      const tabs = [
        { id: 'overview',   label: '概览' },
        { id: 'users',      label: '用户管理' },
        { id: 'roles',      label: '权限管理' },
        { id: 'identity',   label: '身份与连接' },
        { id: 'audit',      label: '审计日志' },
        { id: 'system',     label: '系统设置' },
      ];
      // pull data from window.HERMES_DATA
      const D = window.HERMES_DATA;
      return { tab, tabs, D };
    },
    template: `
      <div class="stage">
        <div class="admin-hero">
          <div class="admin-hero-row">
            <span class="admin-badge"><icon name="settings" /> ADMIN CONSOLE</span>
            <span style="font-size:11.5px;color:var(--ink-mute);font-family:var(--font-mono);">v3.4.2 · Hermes Internal</span>
          </div>
          <h1 class="admin-title">后台<em>管理</em></h1>
          <div class="admin-sub">用户、权限、连接器与日志——管理整个 Hermes 实例。</div>
          <div class="admin-tabs">
            <button v-for="t in tabs" :key="t.id"
                    class="team-tab" :class="{active: tab === t.id}"
                    @click="tab = t.id">{{ t.label }}</button>
          </div>
        </div>

        <div class="admin-body">
          <admin-overview    v-if="tab === 'overview'"
                             :stats="D.ADMIN_STATS"
                             :providers="D.IDENTITY_PROVIDERS"
                             :audit="D.AUDIT_LOG"
                             :users="D.USERS" />
          <admin-users       v-else-if="tab === 'users'"
                             :users="D.USERS"
                             :roles="D.ROLES" />
          <admin-permissions v-else-if="tab === 'roles'"
                             :roles="D.ROLES"
                             :permissions="D.PERMISSIONS" />
          <admin-identity    v-else-if="tab === 'identity'"
                             :providers="D.IDENTITY_PROVIDERS" />
          <admin-audit       v-else-if="tab === 'audit'"

  };

  return { AdminPage };
})();

</script>
<!-- hermes-modals.js -->
<script>
// Hermes — modal dialogs: New Project, Invite Members
window.HERMES_MODALS = (() => {
  const { ref, reactive, computed, watch, onMounted, onBeforeUnmount, nextTick } = Vue;
  const Icon = window.HERMES_ICONS.Icon;
  const { AGENTS } = window.HERMES_DATA;

  // ───────── Shell ─────────
  const ModalShell = {
    name: 'ModalShell',
    components: { Icon },
    props: { title: String, subtitle: String, width: { type: Number, default: 560 } },
    emits: ['close'],
    template: `
      <div class="modal-scrim" @mousedown.self="$emit('close')">
        <div class="modal" :style="{ maxWidth: width + 'px' }" role="dialog">
          <div class="modal-head">
            <div>
              <div class="modal-title">{{ title }}</div>
              <div v-if="subtitle" class="modal-sub">{{ subtitle }}</div>
            </div>
            <button class="modal-close" @click="$emit('close')" aria-label="关闭"><icon name="close" /></button>
          </div>
          <div class="modal-body"><slot /></div>
          <div class="modal-foot"><slot name="foot" /></div>
        </div>
      </div>
    `
  };

  // ───────── New Project ─────────
  const PROJECT_COLORS  = ['#b8852a', '#3a6da1', '#8a5aa1', '#5b8a4a', '#c45a3a', '#3a8a7a', '#6a3aa1', '#1d1a14'];
  const PROJECT_ICONS   = ['sparkle', 'cube', 'target', 'chart2', 'doc', 'chart', 'globe', 'compass'];
  const SECTION_PRESETS = [
    { id: 'concept',  label: '概念' },
    { id: 'spec',     label: '规范' },
    { id: 'rollout',  label: '上线' },
    { id: 'audit',    label: '盘点' },
    { id: 'metric',   label: '指标' },
    { id: 'baseline', label: '基线' },
    { id: 'deck',     label: '演示' },
    { id: 'press',    label: '媒体' },
  ];

  const NewProjectModal = {
    name: 'NewProjectModal',
    components: { Icon, ModalShell },
    props: { team: Object, project: { type: Object, default: null } },
    emits: ['close', 'create', 'save'],
    setup(props, { emit }) {
      const editing = !!props.project;
      const src = props.project || {};
      const form = reactive({
        name: src.name || '',
        handle: src.handle || '',
        color: src.color || PROJECT_COLORS[0],
        icon: src.icon || PROJECT_ICONS[0],
        summary: src.summary && src.summary !== '（暂无简介）' ? src.summary : '',
        deadline: src.deadline || defaultDeadline(),
        sections: src.sections ? [...src.sections] : ['concept', 'spec', 'rollout'],
        pinnedAgents: src.pinnedAgents ? [...src.pinnedAgents] : ['hermes', 'cowork'],
        members: src.members ? [...src.members] : (props.team.members || []).slice(0, 2).map(m => m.handle),
        visibility: src.visibility || 'team', // team | private | public
      });

      // Auto-generate handle from name (pinyin-ish: keep ascii, replace spaces with -)
      let handleEdited = false;
      watch(() => form.name, (v) => {
        if (!handleEdited) {
          form.handle = (v || '')
            .trim()
            .toLowerCase()
            .replace(/\s+/g, '-')
            .replace(/[^\w\-\u4e00-\u9fff]/g, '')
            .slice(0, 24);
        }
      });

      const onHandleInput = (e) => { handleEdited = true; form.handle = e.target.value; };

      const valid = computed(() => form.name.trim().length >= 2);

      const toggleSection = (id) => {
        const i = form.sections.indexOf(id);
        if (i >= 0) form.sections.splice(i, 1);
        else form.sections.push(id);
      };
      const toggleAgent = (id) => {
        const i = form.pinnedAgents.indexOf(id);
        if (i >= 0) form.pinnedAgents.splice(i, 1);
        else form.pinnedAgents.push(id);
      };
      const toggleMember = (h) => {
        const i = form.members.indexOf(h);
        if (i >= 0) form.members.splice(i, 1);
        else form.members.push(h);
      };

      const submit = () => {
        if (!valid.value) return;
        const payload = {
          ...form,
          teamId: props.team.id,
          handle: form.handle || form.name.toLowerCase().replace(/\s+/g, '-').slice(0, 24),
        };
        if (editing) emit('save', { id: props.project.id, ...payload });
        else emit('create', payload);
      };

      function defaultDeadline() {
        const d = new Date();
        d.setMonth(d.getMonth() + 2);
        return d.toISOString().slice(0, 10);
      }

      return { form, onHandleInput, valid, toggleSection, toggleAgent, toggleMember, submit, editing,
        colors: PROJECT_COLORS, icons: PROJECT_ICONS, sections: SECTION_PRESETS,
        agents: AGENTS };
    },
    template: `
      <modal-shell :title="editing ? '编辑项目' : '新建项目'" :subtitle="editing ? ('修改「' + form.name + '」的设置') : ('在「' + team.name + '」团队下创建一个新项目')" :width="640" @close="$emit('close')">
        <!-- IDENTITY: icon + name + handle preview -->
        <div class="np-identity">
          <div class="proj-icon np-preview" :style="{ background: form.color }">
            <icon :name="form.icon" />
          </div>
          <div style="flex:1;min-width:0;">
            <div class="np-name-row">
              <input class="np-input np-name" v-model="form.name" placeholder="项目名称" maxlength="32" autofocus />
              <span class="np-counter">{{ form.name.length }}/32</span>
            </div>
            <div class="np-handle-row">
              <span class="np-handle-at">@</span>
              <input class="np-input np-handle" :value="form.handle" @input="onHandleInput" placeholder="handle" maxlength="24" />
              <span class="np-hint">用于 URL 与跨团队引用</span>
            </div>
          </div>
        </div>

        <!-- COLOR + ICON -->
        <div class="np-row">
          <div class="np-field">
            <label class="np-label">颜色</label>
            <div class="np-swatches">
              <button v-for="c in colors" :key="c"
                      class="np-swatch" :class="{active: form.color === c}"
                      :style="{ background: c }"
                      @click="form.color = c"></button>
            </div>
          </div>
          <div class="np-field">
            <label class="np-label">图标</label>
            <div class="np-icon-row">
              <button v-for="ic in icons" :key="ic"
                      class="np-icon-btn" :class="{active: form.icon === ic}"
                      @click="form.icon = ic">
                <icon :name="ic" />
              </button>
            </div>
          </div>
        </div>

        <!-- SUMMARY -->
        <div class="np-field">
          <label class="np-label">简介 <span class="np-hint">一两句话说明这个项目要解决什么</span></label>
          <textarea class="np-input np-textarea" v-model="form.summary" rows="3"
            placeholder="例如：把视觉、声音、用词都统一到新的品牌主张上。"></textarea>
        </div>

        <!-- DEADLINE + VISIBILITY -->
        <div class="np-row">
          <div class="np-field">
            <label class="np-label">截止日期</label>
            <input class="np-input" type="date" v-model="form.deadline" />
          </div>
          <div class="np-field">
            <label class="np-label">可见性</label>
            <div class="np-seg">
              <button :class="{active: form.visibility === 'team'}" @click="form.visibility = 'team'">
                <icon name="user" /> 团队可见
              </button>
              <button :class="{active: form.visibility === 'private'}" @click="form.visibility = 'private'">
                <icon name="pin" /> 仅成员
              </button>
              <button :class="{active: form.visibility === 'public'}" @click="form.visibility = 'public'">
                <icon name="globe" /> 全员可见
              </button>
            </div>
          </div>
        </div>

        <!-- SECTIONS -->
        <div class="np-field">
          <label class="np-label">项目阶段 <span class="np-hint">用作项目内的分组标签，可后续修改</span></label>
          <div class="np-chips">
            <button v-for="s in sections" :key="s.id"
                    class="np-chip" :class="{on: form.sections.includes(s.id)}"
                    @click="toggleSection(s.id)">
              <icon v-if="form.sections.includes(s.id)" name="check" :size="11" />
              {{ s.label }}
            </button>
          </div>
        </div>

        <!-- PINNED AGENTS -->
        <div class="np-field">
          <label class="np-label">钉选助手 <span class="np-hint">项目首页直接可用 · 已选 {{ form.pinnedAgents.length }}</span></label>
          <div class="np-agents">
            <button v-for="a in agents.slice(0, 8)" :key="a.id"
                    class="np-agent" :class="{on: form.pinnedAgents.includes(a.id)}"
                    @click="toggleAgent(a.id)">
              <span class="np-agent-ico" :style="{ background: a.color }"><icon :name="a.icon" /></span>
              <span class="np-agent-nm">{{ a.name }}</span>
              <span v-if="form.pinnedAgents.includes(a.id)" class="np-agent-check"><icon name="check" :size="9" /></span>
            </button>
          </div>
        </div>

        <!-- MEMBERS -->
        <div class="np-field">
          <label class="np-label">初始成员 <span class="np-hint">从「{{ team.name }}」中选 · 已选 {{ form.members.length }}</span></label>
          <div class="np-members">
            <button v-for="m in team.members" :key="m.handle"
                    class="np-mem" :class="{on: form.members.includes(m.handle)}"
                    @click="toggleMember(m.handle)">
              <span class="np-mem-av" :style="{ background: m.color }">{{ m.initials }}</span>
              <span class="np-mem-nm">{{ m.name }}</span>
              <span class="np-mem-role">{{ m.role }}</span>
              <span v-if="form.members.includes(m.handle)" class="np-mem-check"><icon name="check" :size="10" /></span>
            </button>
          </div>
        </div>

        <template #foot>
          <span class="np-foot-hint">{{ editing ? '修改会立即生效' : '项目会立即在团队主页显示' }}</span>
          <span style="flex:1;"></span>
          <button class="btn" @click="$emit('close')">取消</button>
          <button class="btn primary" :disabled="!valid" @click="submit">
            <icon :name="editing ? 'check' : 'plus'" /> {{ editing ? '保存修改' : '创建项目' }}
          </button>
        </template>
      </modal-shell>
    `
  };

  // ───────── Invite Members ─────────
  const InviteMembersModal = {
    name: 'InviteMembersModal',
    components: { Icon, ModalShell },
    props: { team: Object },
    emits: ['close', 'invite', 'toast'],
    setup(props, { emit }) {
      const tab = ref('link'); // link | email | sso
      const role = ref('member');
      const expires = ref('7d');

      const baseLink = computed(() =>
        `https://hermes.io/i/${props.team.handle}/${rid()}`);
      const link = ref(baseLink.value);
      watch(() => [props.team.id, role.value, expires.value], () => {
        link.value = baseLink.value;
      });

      function rid() {
        return Math.random().toString(36).slice(2, 8) + Math.random().toString(36).slice(2, 6);
      }

      const copied = ref(false);
      const copyLink = () => {
        try {
          navigator.clipboard.writeText(link.value);
          copied.value = true;
          setTimeout(() => { copied.value = false; }, 1600);
        } catch (e) { /* noop */ }
      };
      const regen = () => { link.value = baseLink.value; };

      const emailInput = ref('');
      const parsedEmails = computed(() => {
        return (emailInput.value || '')
          .split(/[,\s;\n]+/)
          .map(s => s.trim())
          .filter(s => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s));
      });

      const pending = ref([
        { email: 'xu.sh@hermes.io',     name: '徐时书 (待接受)', role: 'member',     sent: '昨天 09:12', source: 'wecom' },
        { email: 'qiu.wen@hermes.io',   name: '邱文 (待接受)',   role: 'team_admin', sent: '前天 16:48', source: 'email' },
        { email: 'tao.ji@external.com', name: 'tao.ji (外部)',   role: 'viewer',     sent: '上周 14:10', source: 'email' },
      ]);

      const sso = reactive({
        wecom: { on: true,  syncedToday: 12, deptAuto: '设计部 → 设计组' },
        ldap:  { on: true,  syncedToday: 3,  filter: 'ou=hermes,ou=apps,dc=hermes,dc=io' },
        feishu:{ on: false, syncedToday: 0,  deptAuto: '—' },
      });

      const sendInvites = () => {
        if (!parsedEmails.value.length) return;
        const now = '刚刚';
        parsedEmails.value.forEach(em => {
          pending.value.unshift({
            email: em,
            name: em.split('@')[0] + ' (已发邀请)',
            role: role.value,
            sent: now,
            source: 'email',
          });
        });
        emit('invite', { kind: 'email', emails: parsedEmails.value, role: role.value });
        emailInput.value = '';
      };

      const cancelPending = (i) => {
        pending.value.splice(i, 1);
      };
      const resendPending = (p) => { p.sent = '刚刚'; };

      const ROLES = [
        { id: 'team_admin', name: '团队管理员', desc: '管理项目、成员、助手' },
        { id: 'member',     name: '成员',       desc: '参与对话、上传知识' },
        { id: 'viewer',     name: '只读',       desc: '仅查看分享内容' },
      ];
      const EXPIRES = [
        { id: '1d',  label: '1 天' },
        { id: '7d',  label: '7 天' },
        { id: '30d', label: '30 天' },
        { id: 'never', label: '永不' },
      ];

      return { tab, role, expires, link, copied, copyLink, regen,
        emailInput, parsedEmails, sendInvites,
        pending, cancelPending, resendPending,
        sso, ROLES, EXPIRES };
    },
    template: `
      <modal-shell title="邀请成员" :subtitle="'加入「' + team.name + '」团队'" :width="640" @close="$emit('close')">
        <!-- ROLE selector — applies to all invite methods below -->
        <div class="np-field">
          <label class="np-label">邀请角色 <span class="np-hint">被邀请者加入后的初始角色</span></label>
          <div class="inv-roles">
            <button v-for="r in ROLES" :key="r.id"
                    class="inv-role" :class="{on: role === r.id}"
                    @click="role = r.id">
              <div class="inv-role-nm">{{ r.name }}</div>
              <div class="inv-role-ds">{{ r.desc }}</div>
            </button>
          </div>
        </div>

        <!-- Method tabs -->
        <div class="inv-tabs">
          <button :class="{on: tab === 'link'}" @click="tab = 'link'"><icon name="share" /> 邀请链接</button>
          <button :class="{on: tab === 'email'}" @click="tab = 'email'"><icon name="paperclip" /> 邮箱邀请</button>
          <button :class="{on: tab === 'sso'}" @click="tab = 'sso'"><icon name="bolt" /> SSO 自动同步</button>
        </div>

        <!-- LINK -->
        <div v-if="tab === 'link'" class="inv-pane">
          <div class="inv-link-box">
            <icon name="share" />
            <input class="np-input inv-link-input" :value="link" readonly @click="$event.target.select()" />
            <button class="btn" @click="regen" title="重新生成"><icon name="refresh" /></button>
            <button class="btn primary" @click="copyLink">
              <icon :name="copied ? 'check' : 'copy'" /> {{ copied ? '已复制' : '复制' }}
            </button>
          </div>
          <div class="np-row" style="margin-top:14px;">
            <div class="np-field">
              <label class="np-label">链接有效期</label>
              <div class="np-seg">
                <button v-for="e in EXPIRES" :key="e.id"
                        :class="{active: expires === e.id}" @click="expires = e.id">{{ e.label }}</button>
              </div>
            </div>
            <div class="np-field">
              <label class="np-label">使用限制</label>
              <div class="inv-meta">
                <span><icon name="user" /> 不限人数</span>
                <span><icon name="check" /> 需邮箱验证</span>
                <span><icon name="globe" /> 仅 @hermes.io 后缀</span>
              </div>
            </div>
          </div>
        </div>

        <!-- EMAIL -->
        <div v-else-if="tab === 'email'" class="inv-pane">
          <textarea class="np-input np-textarea inv-email-input"
                    v-model="emailInput" rows="4"
                    placeholder="一行一个邮箱，或用逗号/空格分隔——例如：&#10;zhiwei@hermes.io, xu.sh@hermes.io&#10;qiu.wen@hermes.io"></textarea>
          <div class="inv-email-foot">
            <span v-if="parsedEmails.length" class="inv-parsed">
              <icon name="check" /> 识别到 {{ parsedEmails.length }} 个有效邮箱
            </span>
            <span v-else class="inv-parsed empty">输入邮箱后会自动识别</span>
            <span style="flex:1;"></span>
            <button class="btn primary" :disabled="!parsedEmails.length" @click="sendInvites">
              <icon name="arrow_up" /> 发送邀请
            </button>
          </div>
        </div>

        <!-- SSO -->
        <div v-else class="inv-pane">
          <div class="inv-sso-row">
            <div class="inv-sso-icon" style="background:#3a7a2a;color:white;">W</div>
            <div style="flex:1;min-width:0;">
              <div class="inv-sso-nm">企业微信 SSO <span v-if="sso.wecom.on" class="inv-sso-on">同步中</span><span v-else class="inv-sso-off">已停用</span></div>
              <div class="inv-sso-ds">今日已自动加入 {{ sso.wecom.syncedToday }} 人 · 部门映射：{{ sso.wecom.deptAuto }}</div>
            </div>
            <div class="cfg-toggle" :class="{on: sso.wecom.on}" @click="sso.wecom.on = !sso.wecom.on"></div>
          </div>
          <div class="inv-sso-row">
            <div class="inv-sso-icon" style="background:#3a6da1;color:white;">L</div>
            <div style="flex:1;min-width:0;">
              <div class="inv-sso-nm">LDAP / AD <span v-if="sso.ldap.on" class="inv-sso-on">同步中</span><span v-else class="inv-sso-off">已停用</span></div>
              <div class="inv-sso-ds" style="font-family:var(--font-mono);font-size:11px;">today: +{{ sso.ldap.syncedToday }} · filter: {{ sso.ldap.filter }}</div>
            </div>
            <div class="cfg-toggle" :class="{on: sso.ldap.on}" @click="sso.ldap.on = !sso.ldap.on"></div>
          </div>
          <div class="inv-sso-row">
            <div class="inv-sso-icon" style="background:#6a3aa1;color:white;">F</div>
            <div style="flex:1;min-width:0;">
              <div class="inv-sso-nm">飞书 SSO <span class="inv-sso-off">未配置</span></div>
              <div class="inv-sso-ds">在「后台 · 身份连接器」中完成配置后启用</div>
            </div>
            <div class="cfg-toggle" :class="{on: sso.feishu.on}" @click="sso.feishu.on = !sso.feishu.on"></div>
          </div>
        </div>

        <!-- PENDING -->
        <div class="np-field" style="margin-top:18px;">
          <label class="np-label">待处理邀请 · {{ pending.length }}</label>
          <div class="inv-pending">
            <div v-for="(p, i) in pending" :key="i" class="inv-pending-row">
              <div class="inv-pending-em">{{ p.email }}</div>
              <div class="inv-pending-meta">
                <span class="role-pill" :class="p.role">{{ p.role === 'team_admin' ? '团队管理员' : (p.role === 'viewer' ? '只读' : '成员') }}</span>
                <span>· 发送于 {{ p.sent }}</span>
                <span>· 来源 {{ p.source === 'wecom' ? '企业微信' : '邮件' }}</span>
              </div>
              <button class="inv-pending-action" @click="resendPending(p)" title="重发">
                <icon name="refresh" />
              </button>
              <button class="inv-pending-action danger" @click="cancelPending(i)" title="撤销">
                <icon name="close" />
              </button>
            </div>
            <div v-if="!pending.length" class="inv-pending-empty">暂无待处理邀请。</div>
          </div>
        </div>

        <template #foot>
          <span class="np-foot-hint">受邀者会收到邮件 · 加入后默认共享 {{ (team.sharedAgents || []).length }} 个团队助手</span>
          <span style="flex:1;"></span>
          <button class="btn" @click="$emit('close')">关闭</button>
        </template>
      </modal-shell>
    `
  };

  const KB_KINDS = ['pdf', 'docx', 'xlsx', 'md', 'fig', 'csv', 'json', 'note'];
  const KB_ICON = { pdf: 'doc', docx: 'doc', md: 'note', note: 'note', xlsx: 'chart', csv: 'chart', fig: 'sparkle', json: 'cube' };

          <div class="np-field">

        <div class="np-row">

<script>
// Hermes — tiny dependency-free flowchart renderer for ```mermaid blocks.
// Supports the common subset: `flowchart`/`graph` with TB/TD/BT/LR/RL,
// node shapes  A[rect]  B(rounded)  C{diamond}  with optional "quoted" labels,
// edges  A --> B  and labelled edges  A -->|label| B  (chains allowed).
// Emits a self-contained, themable <svg>. No async, no external deps.
window.HERMES_FLOW = (() => {
  const esc = (s) => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  let SEQ = 0;

  function parse(code) {
    const lines = code.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('%%'));
    let dir = 'TB';
    if (lines.length) {
      const m = lines[0].match(/^(?:flowchart|graph)\s+(TB|TD|BT|LR|RL)\b/i);
      if (m) { dir = m[1].toUpperCase(); lines.shift(); }
      else if (/^(?:flowchart|graph)\b/i.test(lines[0])) { lines.shift(); }
    }
    if (dir === 'TD') dir = 'TB';

    const nodes = new Map();
    const edges = [];
    const shapeOf = (open) => open === '{' ? 'diamond' : (open === '(' ? 'round' : 'rect');
    const ensure = (id, label, shape) => {
      if (!nodes.has(id)) nodes.set(id, { id, label: label != null ? label : id, shape: shape || 'rect' });
      else if (label != null) { const n = nodes.get(id); n.label = label; if (shape) n.shape = shape; }
      return id;
    };
    const readNode = (seg) => {
      const m = (seg || '').trim().match(/^([A-Za-z0-9_]+)\s*(?:(\[)([^\]]*)\]|(\()([^)]*)\)|(\{)([^}]*)\})?/);
      if (!m) return null;
      const id = m[1];
      let label = null, shape = null;
      const open = m[2] || m[4] || m[6];
      if (open) {
        shape = shapeOf(open);
        let inner = (m[3] != null ? m[3] : (m[5] != null ? m[5] : m[7])) || '';
        label = inner.trim().replace(/^"([\s\S]*)"$/, '$1');
      }
      return ensure(id, label, shape);
    };

    lines.forEach(line => {
      const parts = line.split(/-->/);
      if (parts.length === 1) { readNode(parts[0]); return; }
      let prev = readNode(parts[0]);
      for (let k = 1; k < parts.length; k++) {
        let seg = parts[k], label = null;
        const lm = seg.match(/^\s*\|([^|]*)\|\s*([\s\S]*)$/);
        if (lm) { label = lm[1].trim().replace(/^"([\s\S]*)"$/, '$1'); seg = lm[2]; }
        const id = readNode(seg);
        if (prev && id) edges.push({ from: prev, to: id, label });
        prev = id;
      }
    });
    return { dir, nodes: [...nodes.values()], edges };
  }

  function rankNodes(nodes, edges) {
    const adj = new Map(); nodes.forEach(n => adj.set(n.id, []));
    edges.forEach(e => { if (adj.has(e.from)) adj.get(e.from).push(e.to); });
    const state = new Map(); nodes.forEach(n => state.set(n.id, 0));
    const back = new Set();
    const stack = [];
    // iterative DFS to flag back edges (cycles)
    nodes.forEach(start => {
      if (state.get(start.id) !== 0) return;
      stack.push([start.id, 0]); state.set(start.id, 1);
      while (stack.length) {
        const top = stack[stack.length - 1];
        const nbrs = adj.get(top[0]) || [];
        if (top[1] < nbrs.length) {
          const v = nbrs[top[1]++];
          if (state.get(v) === 1) back.add(top[0] + '\u0000' + v);
          else if (state.get(v) === 0) { state.set(v, 1); stack.push([v, 0]); }
        } else { state.set(top[0], 2); stack.pop(); }
      }
    });
    const fwd = edges.filter(e => !back.has(e.from + '\u0000' + e.to));
    const rank = new Map(); nodes.forEach(n => rank.set(n.id, 0));
    for (let it = 0; it < nodes.length + 1; it++) {
      let changed = false;
      fwd.forEach(e => { if (rank.get(e.to) < rank.get(e.from) + 1) { rank.set(e.to, rank.get(e.from) + 1); changed = true; } });
      if (!changed) break;
    }
    return rank;
  }

  const measure = (label) => {
    let w = 0;
    for (const ch of String(label)) w += /[\u3000-\u9fff\uff00-\uffef]/.test(ch) ? 15 : (/[A-Z]/.test(ch) ? 9 : 7.4);
    return w;
  };

  function render(code) {
    let p;
    try { p = parse(code); } catch (e) { return null; }
    const { dir, nodes, edges } = p;
    if (!nodes.length) return null;
    const rank = rankNodes(nodes, edges);
    const horizontal = (dir === 'LR' || dir === 'RL');

    const ranks = {};
    nodes.forEach(n => { const r = rank.get(n.id); (ranks[r] = ranks[r] || []).push(n); });
    const rankKeys = Object.keys(ranks).map(Number).sort((a, b) => a - b);

    const PADX = 17, H = 38, DH = 48;
    const sizes = new Map();
    nodes.forEach(n => sizes.set(n.id, { w: Math.max(62, measure(n.label) + PADX * 2), h: n.shape === 'diamond' ? DH : H }));

    const LANE = horizontal ? 74 : 50, GAP = 26;
    const pos = new Map();
    let W, Htot;

    if (!horizontal) {
      const rw = {}; let maxW = 0;
      rankKeys.forEach(r => { let t = 0; ranks[r].forEach(n => t += sizes.get(n.id).w); t += GAP * (ranks[r].length - 1); rw[r] = t; maxW = Math.max(maxW, t); });
      let y = 0;
      rankKeys.forEach(r => {
        let x = (maxW - rw[r]) / 2; const rowH = Math.max(...ranks[r].map(n => sizes.get(n.id).h));
        ranks[r].forEach(n => { const s = sizes.get(n.id); pos.set(n.id, { x: x + s.w / 2, y: y + rowH / 2, w: s.w, h: s.h }); x += s.w + GAP; });
        y += rowH + LANE;
      });
      W = maxW; Htot = y - LANE;
    } else {
      const rh = {}; let maxH = 0; const cw = {};
      rankKeys.forEach(r => { let t = 0; ranks[r].forEach(n => t += sizes.get(n.id).h); t += GAP * (ranks[r].length - 1); rh[r] = t; maxH = Math.max(maxH, t); cw[r] = Math.max(...ranks[r].map(n => sizes.get(n.id).w)); });
      let x = 0;
      rankKeys.forEach(r => {
        let yy = (maxH - rh[r]) / 2;
        ranks[r].forEach(n => { const s = sizes.get(n.id); pos.set(n.id, { x: x + cw[r] / 2, y: yy + s.h / 2, w: s.w, h: s.h }); yy += s.h + GAP; });
        x += cw[r] + LANE;
      });
      W = x - LANE; Htot = maxH;
    }

    const PAD = 14, tW = W + PAD * 2, tH = Htot + PAD * 2;
    const off = (p2) => ({ x: p2.x + PAD, y: p2.y + PAD, w: p2.w, h: p2.h });
    const border = (c, tx, ty) => {
      const dx = tx - c.x, dy = ty - c.y, hw = c.w / 2, hh = c.h / 2;
      if (!dx && !dy) return { x: c.x, y: c.y };
      const s = 1 / Math.max(Math.abs(dx) / hw, Math.abs(dy) / hh);
      return { x: c.x + dx * s, y: c.y + dy * s };
    };

    const mid = 'fl-arrow-' + (++SEQ);
    let body = '';
    edges.forEach(e => {
      const a = pos.get(e.from), b = pos.get(e.to); if (!a || !b) return;
      const A = off(a), B = off(b);
      const s = border(A, B.x, B.y), t = border(B, A.x, A.y);
      const mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
      body += `<path class="fl-edge" d="M${s.x.toFixed(1)} ${s.y.toFixed(1)} Q ${mx.toFixed(1)} ${my.toFixed(1)} ${t.x.toFixed(1)} ${t.y.toFixed(1)}" marker-end="url(#${mid})"/>`;
      if (e.label) {
        const lw = measure(e.label) + 12;
        body += `<rect class="fl-elabel-bg" x="${(mx - lw / 2).toFixed(1)}" y="${(my - 9).toFixed(1)}" width="${lw.toFixed(1)}" height="18" rx="4"/>`;
        body += `<text class="fl-elabel" x="${mx.toFixed(1)}" y="${(my + 4).toFixed(1)}" text-anchor="middle">${esc(e.label)}</text>`;
      }
    });
    nodes.forEach(n => {
      const c = off(pos.get(n.id)), s = sizes.get(n.id);
      const x = c.x - s.w / 2, y = c.y - s.h / 2;
      if (n.shape === 'diamond') {
        body += `<polygon class="fl-node fl-diamond" points="${c.x.toFixed(1)},${y.toFixed(1)} ${(x + s.w).toFixed(1)},${c.y.toFixed(1)} ${c.x.toFixed(1)},${(y + s.h).toFixed(1)} ${x.toFixed(1)},${c.y.toFixed(1)}"/>`;
      } else {
        const rx = n.shape === 'round' ? s.h / 2 : 9;
        body += `<rect class="fl-node" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${s.w.toFixed(1)}" height="${s.h}" rx="${rx}"/>`;
      }
      body += `<text class="fl-text" x="${c.x.toFixed(1)}" y="${(c.y + 4.5).toFixed(1)}" text-anchor="middle">${esc(n.label)}</text>`;
    });

    return `<svg class="fl-svg" viewBox="0 0 ${tW.toFixed(0)} ${tH.toFixed(0)}" width="${tW.toFixed(0)}" height="${tH.toFixed(0)}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="flowchart">`
      + `<defs><marker id="${mid}" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7.5,3 L0,6 Z" class="fl-arrowhead"/></marker></defs>`
      + body + `</svg>`;
  }

  return { render };
})();

</script>

<script>
// Hermes — compact, dependency-free Markdown renderer for chat messages.
// Escapes HTML first, then emits a small, safe subset (headings, lists, task
// lists, blockquotes, fenced code, inline code, bold/italic/strike, links,
// tables, hr). Output is injected via v-html into message bubbles.
window.HERMES_MD = (() => {
  const esc = (s) => String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  function inline(s) {
    s = esc(s);
    // protect inline code spans
    const codes = [];
    s = s.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return '\u0000' + (codes.length - 1) + '\u0000'; });
    // bold
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    // italic (avoid touching ** already consumed)
    s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    s = s.replace(/(^|[^_\w])_([^_\n]+)_/g, '$1<em>$2</em>');
    // strikethrough
    s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
    // links [text](url)
    s = s.replace(/\[([^\]]+)\]\((https?:[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // restore code spans
    s = s.replace(/\u0000(\d+)\u0000/g, (m, i) => '<code class="md-code">' + codes[+i] + '</code>');
    return s;
  }

  function render(text) {
    if (text == null) return '';
    const lines = String(text).replace(/\r\n/g, '\n').split('\n');
    const ulRe = /^(\s*)([-*+•·])\s+(.*)$/;
    const olRe = /^(\s*)(\d+)[.)]\s+(.*)$/;
    const isBlank = (l) => !l.trim();
    const isBlockStart = (l) =>
      /^\s*```/.test(l) || /^\s*#{1,6}\s/.test(l) || /^\s*>\s?/.test(l) ||
      ulRe.test(l) || olRe.test(l) || /^\s*([-*_])\1\1+\s*$/.test(l);

    let html = '', i = 0;
    while (i < lines.length) {
      const line = lines[i];

      // fenced code
      const fence = line.match(/^\s*```(\w*)\s*$/);
      if (fence) {
        const lang = (fence[1] || '').toLowerCase();
        i++; const buf = [];
        while (i < lines.length && !/^\s*```\s*$/.test(lines[i])) { buf.push(lines[i]); i++; }
        i++;
        if (lang === 'mermaid') {
          const src = buf.join('\n');
          const svg = (window.HERMES_FLOW && window.HERMES_FLOW.render) ? window.HERMES_FLOW.render(src) : null;
          if (svg) {
            html += '<div class="mermaid-wrap"><div class="mermaid-cap">流程图 · DIAGRAM</div><div class="fl-canvas">' + svg + '</div></div>';
          } else {
            html += '<pre class="md-pre"><code>' + esc(src) + '</code></pre>';
          }
        } else {
          html += '<pre class="md-pre"><code>' + esc(buf.join('\n')) + '</code></pre>';
        }
        continue;
      }
      if (isBlank(line)) { i++; continue; }

      // heading
      const h = line.match(/^\s*(#{1,6})\s+(.*)$/);
      if (h) { const lvl = h[1].length; html += `<div class="md-h md-h${lvl}">${inline(h[2])}</div>`; i++; continue; }

      // hr
      if (/^\s*([-*_])\1\1+\s*$/.test(line)) { html += '<hr class="md-hr">'; i++; continue; }

      // blockquote
      if (/^\s*>\s?/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\s*>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
        html += '<blockquote class="md-quote">' + render(buf.join('\n')) + '</blockquote>';
        continue;
      }

      // table (header row + separator row)
      if (line.includes('|') && i + 1 < lines.length &&
          /^\s*\|?[\s:|-]*-[\s:|-]*$/.test(lines[i + 1]) && lines[i + 1].includes('-')) {
        const parseRow = (l) => l.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
        const headers = parseRow(line); i += 2; const rows = [];
        while (i < lines.length && lines[i].includes('|') && !isBlank(lines[i])) { rows.push(parseRow(lines[i])); i++; }
        let t = '<table class="md-table"><thead><tr>' + headers.map(c => '<th>' + inline(c) + '</th>').join('') + '</tr></thead><tbody>';
        rows.forEach(r => { t += '<tr>' + r.map(c => '<td>' + inline(c) + '</td>').join('') + '</tr>'; });
        html += t + '</tbody></table>';
        continue;
      }

      // lists
      if (ulRe.test(line) || olRe.test(line)) {
        const ordered = olRe.test(line);
        const re = ordered ? olRe : ulRe;
        let items = '';
        while (i < lines.length) {
          const m = lines[i].match(re);
          if (!m) break;
          let content = m[3]; i++;
          // gather wrapped continuation lines
          while (i < lines.length && !isBlank(lines[i]) && !isBlockStart(lines[i])) { content += '\n' + lines[i].trim(); i++; }
          const task = content.match(/^\[([ xX])\]\s+([\s\S]*)$/);
          if (task) {
            items += `<li class="md-task"><span class="md-check${task[1].toLowerCase() === 'x' ? ' on' : ''}"></span><span>${inline(task[2]).replace(/\n/g, '<br>')}</span></li>`;
          } else {
            items += '<li>' + inline(content).replace(/\n/g, '<br>') + '</li>';
          }
        }
        html += ordered ? `<ol class="md-ol">${items}</ol>` : `<ul class="md-ul">${items}</ul>`;
        continue;
      }

      // paragraph
      const buf = [];
      while (i < lines.length && !isBlank(lines[i]) && !isBlockStart(lines[i])) { buf.push(lines[i]); i++; }
      html += '<p class="md-p">' + buf.map(inline).join('<br>') + '</p>';
    }
    return html;
  }

  return { render };
})();

</script>

<script>
// Hermes — Login screen (账号密码 / LDAP·AD / 企业微信 SSO / 其他连接器)
window.HERMES_LOGIN = (() => {
  const { ref, computed, reactive, onMounted, onBeforeUnmount } = Vue;
  const Icon = window.HERMES_ICONS.Icon;
  const { IDENTITY_PROVIDERS, USERS } = window.HERMES_DATA;

  // provider visual metadata (shared with admin identity look)
  const META = {
    ldap:   { color: '#3a6da1', icon: 'cube',    letter: 'L', label: 'LDAP / AD' },
    wecom:  { color: '#3a7a2a', icon: null,      letter: '微', label: '企业微信' },
    saml:   { color: '#6a3aa1', icon: 'sparkle', letter: 'S', label: 'SAML SSO' },
    oidc:   { color: '#c47a2a', icon: 'globe',   letter: 'O', label: 'OIDC' },
    feishu: { color: '#3a8a8a', icon: null,      letter: '飞', label: '飞书' },
  };

  const LoginPage = {
    name: 'LoginPage',
    components: { Icon },
    emits: ['login'],
    setup(props, { emit }) {
      const P = IDENTITY_PROVIDERS;
      // build method tabs: always local + each enabled identity provider
      const enabled = Object.keys(P).filter(k => P[k].enabled);
      const tabs = computed(() => {
        const t = [{ id: 'local', label: '账号密码' }];
        enabled.forEach(k => t.push({ id: k, label: META[k] ? META[k].label : k }));
        return t;
      });
      const method = ref('local');

      // local form
      const account = ref('zhiwei');
      const password = ref('demo-pass-2026');
      const remember = ref(true);
      const showPw = ref(false);

      // ldap form
      const ldapUser = ref('');
      const ldapPw = ref('');

      const error = ref('');
      const busy = ref(false);

      // QR for wecom — animated "scan" state
      const qrState = ref('waiting'); // waiting | scanned | confirmed
      let qrTimer = null;
      const startQrCycle = () => {
        clearTimeout(qrTimer);
        qrState.value = 'waiting';
        qrTimer = setTimeout(() => {
          qrState.value = 'scanned';
          qrTimer = setTimeout(() => {
            qrState.value = 'confirmed';
            qrTimer = setTimeout(() => finishLogin('wecom', 'yingch'), 700);
          }, 1400);
        }, 4200);
      };
      const refreshQr = () => startQrCycle();

      // disabled providers for "其他方式"
      const others = Object.keys(P).filter(k => !P[k].enabled);

      const finishLogin = (m, handle) => {
        busy.value = true;
        const u = handle ? USERS.find(x => x.handle === handle) : null;
        setTimeout(() => { emit('login', { method: m, user: u || null }); }, 420);
      };

      const submitLocal = () => {
        error.value = '';
        if (!account.value.trim()) { error.value = '请输入用户名或邮箱'; return; }
        if (!password.value.trim()) { error.value = '请输入密码'; return; }
        // demo: resolve a matching seed user if account matches a handle/email
        const u = USERS.find(x => x.handle === account.value.trim() || x.email === account.value.trim());
        finishLogin('local', u ? u.handle : 'zhiwei');
      };
      const submitLdap = () => {
        error.value = '';
        if (!ldapUser.value.trim()) { error.value = '请输入域账号'; return; }
        if (!ldapPw.value.trim()) { error.value = '请输入域密码'; return; }
        const u = USERS.find(x => x.source === 'ldap');
        finishLogin('ldap', u ? u.handle : 'yanzhi');
      };

      const pickMethod = (id) => {
        method.value = id; error.value = '';
        if (id === 'wecom') startQrCycle();
        else clearTimeout(qrTimer);
      };

      onMounted(() => { if (method.value === 'wecom') startQrCycle(); });
      onBeforeUnmount(() => clearTimeout(qrTimer));

      const enterDemo = () => finishLogin('local', 'zhiwei');

      const today = new Date();
      const dateStr = `${today.getFullYear()} 年 ${today.getMonth() + 1} 月 ${today.getDate()} 日`;

      return { tabs, method, pickMethod, account, password, remember, showPw,
        ldapUser, ldapPw, error, busy, qrState, refreshQr, others, META, P,
        submitLocal, submitLdap, enterDemo, dateStr };
    },
    template: `
      <div class="login-screen">
        <!-- LEFT — brand / atmosphere -->
        <div class="login-brand">
          <div class="login-brand-top">
            <div class="login-mark"><icon name="brand" :size="30" /></div>
            <div>
              <div class="login-wordmark">Hermes</div>
              <div class="login-wordtag">信使 · MESSENGER</div>
            </div>
          </div>
          <div class="login-brand-mid">
            <div class="login-quote">凡所欲遣，<br><em>皆可托信使。</em></div>
            <div class="login-quote-sub">Quidquid mittere vis, mihi crede.</div>
          </div>
          <div class="login-brand-foot">
            <div class="login-foot-line"><span class="lf-dot"></span> 企业内部部署 · Hermes Internal</div>
            <div class="login-foot-meta">v3.4.2 · 已接入 LDAP / 企业微信 · {{ dateStr }}</div>
          </div>
          <div class="login-seal-bg" aria-hidden="true">信</div>
        </div>

        <!-- RIGHT — auth card -->
        <div class="login-panel">
          <div class="login-card">
            <div class="login-card-head">
              <div class="login-card-title">登录到工作区</div>
              <div class="login-card-sub">使用企业身份或本地账号继续</div>
            </div>

            <div class="login-tabs">
              <button v-for="t in tabs" :key="t.id"
                      class="login-tab" :class="{active: method === t.id}"
                      @click="pickMethod(t.id)">{{ t.label }}</button>
            </div>

            <!-- LOCAL -->
            <div v-if="method === 'local'" class="login-pane">
              <label class="login-field">
                <span class="login-label">用户名 / 邮箱</span>
                <div class="login-input-wrap">
                  <icon name="user" class="li-ico" />
                  <input v-model="account" class="login-input" placeholder="zhiwei 或 you@hermes.io"
                         @keydown.enter="submitLocal" autofocus />
                </div>
              </label>
              <label class="login-field">
                <span class="login-label">密码 <a class="login-link" @click.prevent="">忘记密码？</a></span>
                <div class="login-input-wrap">
                  <icon name="settings" class="li-ico" />
                  <input :type="showPw ? 'text' : 'password'" v-model="password" class="login-input"
                         placeholder="••••••••" @keydown.enter="submitLocal" />
                  <button class="li-eye" @click="showPw = !showPw" :title="showPw ? '隐藏' : '显示'" type="button">
                    <icon :name="showPw ? 'sun' : 'moon'" :size="14" />
                  </button>
                </div>
              </label>
              <label class="login-remember">
                <span class="login-check" :class="{on: remember}" @click="remember = !remember">
                  <icon v-if="remember" name="check" :size="11" />
                </span>
                7 天内记住此设备
              </label>
              <div v-if="error" class="login-error"><icon name="close" :size="12" /> {{ error }}</div>
              <button class="login-submit" :class="{busy}" @click="submitLocal" :disabled="busy">
                <span v-if="busy" class="typing"><span></span><span></span><span></span></span>
                <template v-else>登录 <icon name="arrow_up" :size="14" style="transform:rotate(90deg);" /></template>
              </button>
            </div>

            <!-- LDAP / AD -->
            <div v-else-if="method === 'ldap'" class="login-pane">
              <div class="login-srv">
                <div class="login-srv-logo" :style="{ background: META.ldap.color }"><icon name="cube" :size="15" /></div>
                <div style="flex:1;min-width:0;">
                  <div class="login-srv-nm">{{ P.ldap.name }}</div>
                  <div class="login-srv-meta">{{ P.ldap.config.host }} · {{ P.ldap.config.encryption }} · 最近同步 {{ P.ldap.lastSync }}</div>
                </div>
                <span class="login-srv-on"><span class="dot"></span>已连接</span>
              </div>
              <label class="login-field">
                <span class="login-label">域账号</span>
                <div class="login-input-wrap">
                  <icon name="user" class="li-ico" />
                  <input v-model="ldapUser" class="login-input" placeholder="DOMAIN\\username 或 sAMAccountName"
                         @keydown.enter="submitLdap" autofocus />
                </div>
              </label>
              <label class="login-field">
                <span class="login-label">域密码</span>
                <div class="login-input-wrap">
                  <icon name="settings" class="li-ico" />
                  <input type="password" v-model="ldapPw" class="login-input" placeholder="••••••••"
                         @keydown.enter="submitLdap" />
                </div>
              </label>
              <div v-if="error" class="login-error"><icon name="close" :size="12" /> {{ error }}</div>
              <button class="login-submit" :class="{busy}" @click="submitLdap" :disabled="busy">
                <span v-if="busy" class="typing"><span></span><span></span><span></span></span>
                <template v-else>通过域账号登录</template>
              </button>
              <div class="login-note"><icon name="check" :size="12" /> 首次登录将按目录同步规则自动开通账号并赋予「成员」角色。</div>
            </div>

            <!-- WECOM (QR) -->
            <div v-else-if="method === 'wecom'" class="login-pane login-pane-qr">
              <div class="login-qr" :class="qrState">
                <div class="login-qr-frame">
                  <div class="qr-grid" aria-hidden="true">
                    <i v-for="n in 49" :key="n" :class="{ fill: (n*7 + (n%5)*3) % 3 === 0 }"></i>
                  </div>
                  <div class="qr-corner tl"></div><div class="qr-corner tr"></div>
                  <div class="qr-corner bl"></div><div class="qr-corner br"></div>
                  <div class="qr-scanline"></div>
                  <div v-if="qrState !== 'waiting'" class="qr-overlay">
                    <div class="qr-overlay-ico" :class="qrState">
                      <icon :name="qrState === 'confirmed' ? 'check' : 'user'" :size="22" />
                    </div>
                    <div class="qr-overlay-tx">{{ qrState === 'confirmed' ? '已确认，正在进入…' : '已扫描，请在手机上确认' }}</div>
                  </div>
                </div>
              </div>
              <div class="login-qr-tip">
                <div class="login-qr-tip-main">请使用 <b>企业微信</b> 扫码登录</div>
                <button class="login-link" @click="refreshQr"><icon name="refresh" :size="12" /> 刷新二维码</button>
              </div>
              <div class="login-note"><icon name="check" :size="12" /> 扫码后按部门 → 团队映射自动开通账号（设计部 → 设计组）。</div>
            </div>

            <!-- OTHER METHODS -->
            <div class="login-others" v-if="others.length">
              <div class="login-or"><span>其他登录方式</span></div>
              <div class="login-other-grid">
                <button v-for="k in others" :key="k" class="login-other"
                        :title="META[k] ? META[k].label : k">
                  <span class="login-other-logo" :style="{ background: (META[k]||{}).color || '#888' }">
                    <icon v-if="META[k] && META[k].icon" :name="META[k].icon" :size="14" />
                    <template v-else>{{ (META[k]||{}).letter || '?' }}</template>
                  </span>
                  {{ META[k] ? META[k].label : k }}
                  <span class="login-other-soon">待配置</span>
                </button>
              </div>
            </div>

            <div class="login-card-foot">
              <span>遇到问题？联系 <a class="login-link" @click.prevent="">IT 支持</a></span>
              <button class="login-demo" @click="enterDemo">跳过 · 进入演示 →</button>
            </div>
          </div>
        </div>
      </div>
    `
  };

  return { LoginPage };
})();

</script>

<script>
// Hermes — User profile & settings page (clicked from sidebar username)
window.HERMES_USER = (() => {
  const { ref, reactive, computed } = Vue;
  const Icon = window.HERMES_ICONS.Icon;
  const { IDENTITY_PROVIDERS } = window.HERMES_DATA;

  const ROLE_LABEL = {
    super_admin: '超级管理员', admin: '管理员', team_admin: '团队管理员',
    member: '成员', viewer: '只读',

  const SRC_LABEL = { local: '本地账号', ldap: 'LDAP / AD', wecom: '企业微信', saml: 'SAML', oidc: 'OIDC' };

  const UserProfilePage = {
    name: 'UserProfilePage',

    props: { user: Object, teams: Array },
    emits: ['back', 'logout', 'toast', 'open-admin'],
    setup(props, { emit }) {

        { id: 'profile',  label: '个人资料' },

      // editable profile model (seeded from current user)

        email: props.user.email,
        title: props.user.title || '设计负责人',

      // preferences

      // security
      const twoFA = ref(true);
      const sessions = ref([
        { id: 's1', device: 'MacBook Pro · Chrome', loc: '上海 · 10.42.1.18', ago: '当前会话', current: true },
        { id: 's2', device: 'iPhone 15 · 企业微信', loc: '上海 · 移动网络', ago: '2 小时前' },
        { id: 's3', device: 'Windows · Edge', loc: '北京 · 10.42.9.4', ago: '昨天 19:02' },
      ]);
      const revoke = (s) => { sessions.value = sessions.value.filter(x => x !== s); emit('toast', '已注销该设备'); };
      const revokeAll = () => { sessions.value = sessions.value.filter(x => x.current); emit('toast', '已注销其他所有设备'); };

      // connected identities
      const connected = computed(() => {
        const list = [];

        if (src && src !== 'local') list.push({ id: src, primary: true });
        (props.user.sso || []).forEach(k => { if (!list.find(x => x.id === k)) list.push({ id: k, primary: false }); });
        if (!list.length) list.push({ id: 'local', primary: true });
        return list;
      });
      const META = {

      // notifications
      const notif = reactive({

        teamInvite: true, weeklyDigest: false, sound: false,
        channelEmail: true, channelWecom: true, channelInApp: true,
      });

      // usage this month
      const usage = { tokens: '318K', sessions: 96, files: 41, quota: 35 };

      const myTeams = computed(() => props.teams || []);
      const isAdmin = props.user.role === 'super_admin' || props.user.role === 'admin';

      return { tab, tabs, form, COLORS, dirty, touch, save, prefs, twoFA,
        sessions, revoke, revokeAll, connected, META, notif, usage, myTeams, isAdmin,
        roleLabel: ROLE_LABEL[props.user.role] || props.user.role,
        srcLabel: SRC_LABEL[props.user.source] || props.user.source,
        metaLabel: (k) => ({ ldap: 'LDAP / AD', wecom: '企业微信', local: '本地账号', feishu: '飞书' }[k] || k) };

          <button class="proj-back" @click="$emit('back')"><icon name="back" :size="12" /> 返回工作区</button>
          <div class="team-hero-row">
            <div class="up-avatar" :style="{ background: form.color }">{{ user.initials }}</div>
            <div class="team-info">
              <div class="team-crumb">个人 · MY ACCOUNT</div>
              <h1 class="team-name">{{ form.name }} <span class="handle">@{{ form.handle }}</span></h1>
              <div class="team-tagline">{{ form.title }} · {{ form.dept }}组</div>
              <div class="team-meta-row">
                <span class="role-pill">{{ roleLabel }}</span>
                <span><icon name="user" /> {{ form.email }}</span>
