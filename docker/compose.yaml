name: hermes

services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes}
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hermes}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hermes-minio-secret}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    image: hermes-api:latest
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@postgres:5432/${POSTGRES_DB:-hermes}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-Hermes@2026}
      FIRST_ADMIN_NAME: ${FIRST_ADMIN_NAME:-林知微}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-db}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hermes}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-hermes-minio-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-workspace}
      # Hermes Agent — set HERMES_BIN to the absolute path on the host (requires
      # the binary to also be accessible inside the container via a bind mount).
      # Set HERMES_HOME to the mounted profile directory (see volumes below).
      HERMES_BIN: ${HERMES_BIN:-hermes}
      HERMES_HOME: ${HERMES_HOME:-}
    # To expose host hermes installation to the API scanner, uncomment these
    # volumes and set HERMES_BIN / HERMES_HOME in a .env file:
    #
    #   HERMES_BIN=/hermes-host/bin/hermes
    #   HERMES_HOME=/hermes-host/.hermes
    #
    # volumes:
    #   - ${HOME}/.local/bin:/hermes-host/bin:ro
    #   - ${HOME}/.hermes:/hermes-host/.hermes:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  agent-runner:
    image: hermes-agent-runner:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@postgres:5432/${POSTGRES_DB:-hermes}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      WORKSPACE_ROOT: /var/hermes/workspaces
      HERMES_BIN: ${HERMES_BIN:-hermes}
      HERMES_ACP_ARGS: ${HERMES_ACP_ARGS:-["acp"]}
      HERMES_ACP_AUTH_METHOD: ${HERMES_ACP_AUTH_METHOD:-}
      ACP_ALLOW_MOCK_FALLBACK: ${ACP_ALLOW_MOCK_FALLBACK:-true}
      ACP_CONSUMER: runner-1
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-db}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hermes}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-hermes-minio-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-workspace}
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      SANDBOX_CMD: ${SANDBOX_CMD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - workspacedata:/var/hermes/workspaces

  web:
    image: hermes-web:latest
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
  redisdata:
  miniodata:
  workspacedata:
