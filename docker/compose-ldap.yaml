services:
  openldap:
    image: docker.m.daocloud.io/osixia/openldap:1.5.0
    container_name: hermes-ldap
    hostname: openldap
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: "Hermes Inc"
      LDAP_DOMAIN: "hermes.local"
      LDAP_ADMIN_PASSWORD: "admin123"
      LDAP_CONFIG_PASSWORD: "config123"
      LDAP_BASE_DN: "dc=hermes,dc=local"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - hermes-net
    restart: unless-stopped

  phpldapadmin:
    image: docker.m.daocloud.io/osixia/phpldapadmin:0.9.0
    container_name: hermes-ldap-admin
    hostname: phpldapadmin
    ports:
      - "6443:443"
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "true"
    depends_on:
      - openldap
    networks:
      - hermes-net
    restart: unless-stopped

volumes:
  ldap_data:
  ldap_config:

networks:
  hermes-net:
    
