# PR 时自动运行：lint + type-check + 测试
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── 后端检查 ──
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hermes_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://hermes:test@localhost:5432/hermes_test
          REDIS_URL: redis://localhost:6379
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://hermes:test@localhost:5432/hermes_test
          REDIS_URL: redis://localhost:6379
        run: pytest -x -q

  # ── 前端检查 ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Build
        working-directory: frontend
        run: npm run build
